name: AI APK Auditor Elite - Sofascore Orchestrator Version

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit-sofascore:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      ## 1. SETUP LINGKUNGAN
      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 python3-pip jq curl
          # JADX
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx
          # Bun & OpenCode
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      ## 2. AMBIL APK
      - name: Download APK
        run: |
          curl -L -o sofascore.apk "https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sofascore.apk"
          echo "✅ APK Terunduh."

      ## 3. BONGKAR APK
      - name: Decompile
        run: |
          jadx sofascore.apk -d extracted_source --no-res --show-bad-code --threads-count 4
          echo "✅ Dekompilasi Selesai (99% Progress)."

      ## 4. PREPARE SCANNING PROMPTS
      - name: Prepare Stage 1 Prompts
        run: |
          python3 - << 'EOF'
          import os, json
          source_dir = 'extracted_source'
          files_context = []
          
          for root, _, files in os.walk(source_dir):
              for file in files:
                  if file.endswith(('.java', '.kt')):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              content = f.read()
                              if any(k in content for k in ['retrofit', 'OkHttpClient', 'X-So-', 'graphql', 'Authorization']):
                                  files_context.append({"file": file, "content": content[:7000]})
                      except: continue

          def save_p(name, focus):
              with open(f'prompt_{name}.json', 'w') as f:
                  json.dump({"focus": focus, "context": files_context[:25]}, f)

          save_p("sec", "Security, Interceptors, Auth Headers, API Keys.")
          save_p("match", "Live Score, Event Details, Lineups.")
          save_p("stats", "Team Standings, Player Stats, Transfers.")
          save_p("gql", "GraphQL Queries and Schemas.")
          EOF

      ## 5. STAGE 1: PARALLEL SCANNING
      - name: Stage 1 - Scanning
        run: |
          ~/.bun/bin/bun install -g opencode-ai
          echo ">>> Agents sedang memburu endpoint..."
          cat prompt_sec.json   | ~/.bun/bin/opencode run > raw_sec.json &
          cat prompt_match.json | ~/.bun/bin/opencode run > raw_match.json &
          cat prompt_stats.json | ~/.bun/bin/opencode run > raw_stats.json &
          cat prompt_gql.json   | ~/.bun/bin/opencode run > raw_gql.json &
          wait

      ## 6. STAGE 2: FINAL ORCHESTRATION (GROUPING & SYNC)
      - name: Stage 2 - Merapikan & Grouping
        run: |
          python3 - << 'EOF'
          import json
          raw_data = {}
          for f in ['raw_sec.json', 'raw_match.json', 'raw_stats.json', 'raw_gql.json']:
              try:
                  with open(f, 'r') as s: raw_data[f] = s.read()
              except: pass
          
          final_instruction = (
              "Kamu adalah Senior API Manager. Tugasmu adalah menggabungkan hasil audit mentah ini.\n"
              "1. BUAT FOLDER: 'Authentication', 'Live Matches', 'Statistics', 'GraphQL'.\n"
              "2. UNIFORMITY: Pastikan semua request menggunakan {{baseUrl}} dan header X-So-Client.\n"
              "3. VARIABLE FIX: Ubah semua ID statis menjadi variabel {{eventId}} atau {{teamId}}.\n"
              "4. OUTPUT: Postman Collection V2.1 JSON yang RAPI dan SIAP PAKAI."
          )
          with open('final_boss_prompt.json', 'w') as f:
              json.dump({"instruction": final_instruction, "raw_data": raw_data}, f)
          EOF

          echo ">>> Agent Manager sedang menyusun folder Postman..."
          cat final_boss_prompt.json | ~/.bun/bin/opencode run > raw_final.json

      ## 7. FINAL VALIDATION & INJECTION
      - name: Final Polish
        run: |
          python3 - << 'EOF'
          import json, re, os
          try:
              raw = open('raw_final.json').read()
              match = re.search(r'(\{.*\})', raw, re.DOTALL)
              if match:
                  data = json.loads(match.group(1))
                  # Injeksi Variabel Global & Header Anti-403
                  data['variable'] = [
                      {"key": "baseUrl", "value": "https://api.sofascore.com", "type": "string"},
                      {"key": "eventId", "value": "1234567"},
                      {"key": "teamId", "value": "1234"}
                  ]
                  with open('Sofascore_Elite_Audit.json', 'w') as f:
                      json.dump(data, f, indent=4)
                  print("✅ Postman Collection Rapi Siap Didownload!")
          except Exception as e:
              print(f"❌ Error Final: {e}")
          EOF

      ## 8. SIMPAN HASIL
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sofascore-elite-results
          path: Sofascore_Elite_Audit.json
