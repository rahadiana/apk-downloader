name: Agentic APK Auditor - Hybrid Stable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agentic-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 jq curl grep
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx

      - name: Fetch Target APK
        run: |
          curl -L -o target.apk "https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sofascore.apk"
          if [ ! -s target.apk ]; then echo "Download gagal!"; exit 1; fi

      - name: Decompile APK
        run: |
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      - name: Map API Structure
        run: |
          mkdir -p audit_hints

          cd extracted_source/sources || exit 1

          # Ambil semua baris API — lebih banyak konteks
          grep -rE "@GET|@POST|@PUT|@DELETE|@PATCH|@HEAD|@OPTIONS|BASE_URL|@Query|@Path|@Body|@Header|@Field|Retrofit|OkHttp|http|https" . \
            | grep -v "Binary\|\.class\|\.png\|\.jpg" \
            | head -n 500 > ../../audit_hints/api_hints.txt || true

          # Cari semua file API/Service/Retrofit/Network
          find . -maxdepth 8 \( \
            -name "*Api*" -o \
            -name "*Service*" -o \
            -name "*Retrofit*" -o \
            -name "*Network*" -o \
            -name "*Client*" -o \
            -name "*Remote*" -o \
            -name "*Endpoint*" \
          \) > ../../audit_hints/file_map.txt || true

          # Dump isi file-file API yang ketemu (max 300 baris per file, total 5 file)
          mkdir -p ../../audit_hints/source_files
          head -5 ../../audit_hints/file_map.txt | while read f; do
            fname=$(basename "$f")
            head -n 300 "$f" > "../../audit_hints/source_files/${fname}.txt" 2>/dev/null || true
          done

          cd ../..

          echo "=== API HINTS ($(wc -l < audit_hints/api_hints.txt) baris) ==="
          echo "=== FILES DITEMUKAN ($(wc -l < audit_hints/file_map.txt) file) ==="
          ls audit_hints/source_files/ 2>/dev/null || true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Agentic Deep Audit
        run: |
          bun install -g opencode-ai

          # Attach semua file source yang ditemukan
          FILE_ARGS=""
          for f in audit_hints/source_files/*.txt; do
            [ -f "$f" ] && FILE_ARGS="$FILE_ARGS -f $f"
          done

          opencode run \
            -f audit_hints/api_hints.txt \
            -f audit_hints/file_map.txt \
            $FILE_ARGS \
            --dangerously-skip-permissions \
            "You are an expert Android API reverse engineer. Analyze ALL the attached source files carefully. Extract every real API endpoint, HTTP method, base URL, query params, path params, headers, and request/response body structure you can find. Then write a complete and accurate Postman Collection V2.1 JSON to a file named Final_Audit_Postman.json. The JSON must have info and item keys. Do not guess or invent endpoints — only include what is actually found in the source code." \
            2>&1 | tee agent_log.txt || true

          echo "=== FILES SETELAH OPENCODE ==="
          ls -la
          find . -name "*.json" 2>/dev/null || true

      - name: Validate Result
        run: |
          python3 -c "
          import json, os, sys
          output_path = 'Final_Audit_Postman.json'
          if not os.path.exists(output_path):
              print('Gagal: File Final_Audit_Postman.json tidak ditemukan.')
              sys.exit(1)
          with open(output_path, 'r', encoding='utf-8') as f:
              content = f.read().strip()
          if not content:
              print('Gagal: File kosong.')
              sys.exit(1)
          try:
              parsed = json.loads(content)
          except json.JSONDecodeError as e:
              print(f'JSON tidak valid: {e}')
              sys.exit(1)
          if 'info' not in parsed or 'item' not in parsed:
              print(f'Bukan Postman Collection V2.1. Keys: {list(parsed.keys())}')
              sys.exit(1)
          print(f'Sukses: {len(parsed.get(\"item\", []))} endpoint(s) ditemukan.')
          "

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            Final_Audit_Postman.json
            agent_log.txt
            audit_hints/
