name: Agentic APK Auditor - Stable Version

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agentic-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      ## 1. SETUP (JADX & Tools)
      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 jq curl grep
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx

      ## 2. FETCH APK
      - name: Fetch Target APK
        run: |
          # Menggunakan link yang kamu berikan sebelumnya sebagai testing
          curl -L -o target.apk "https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sports.apk"
          if [ ! -s target.apk ]; then echo "❌ Download gagal!"; exit 1; fi

      ## 3. DECOMPILE (DEX Only for speed)
      - name: Decompile APK
        run: |
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      ## 4. SETUP BUN & OPENCODE AI
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      ## 5. AGENTIC AI ANALYSIS (REFINED)
      - name: Agentic Deep Audit
        run: |
          bun install -g opencode-ai
          
          # Kita buat instruksi yang lebih 'to-the-point'
          # Kita minta AI menggunakan 'grep' secara eksplisit di awal
          
          cat << 'EOF' > agent_instruction.txt
          Konteks: Kamu adalah Agentic AI yang memiliki akses shell ke folder 'extracted_source/sources'.
          
          Tujuan: Temukan semua API Endpoints dan buat Postman Collection V2.1.
          
          Langkah Wajib:
          1. Jalankan `grep -rE "@GET|@POST|BASE_URL|http" .` untuk memetakan file penting.
          2. Baca file yang paling relevan dengan `cat [nama_file]`.
          3. Analisis header (seperti Authorization atau API Keys).
          
          Output:
          HANYA hasilkan JSON Postman Collection. Jangan ada penjelasan.
          Jika sudah, simpan ke 'Final_Audit_Postman.json'.
          EOF

          # Gunakan flag --allow-shell dengan proteksi path
          opencode run "$(cat agent_instruction.txt)" --allow-shell --path ./extracted_source > agent_log.txt

      ## 6. ROBUST EXTRACTION (ANTI-ERROR)
      - name: Finalize Result
        run: |
          python3 - << 'EOF'
          import re, json, os, sys
          
          def find_json(text):
              # Mencari pola JSON di dalam log agent
              matches = re.findall(r'(\{.*\})', text, re.DOTALL)
              if matches:
                  # Ambil yang paling panjang (biasanya itu Postman Collection-nya)
                  return max(matches, key=len)
              return None

          log_path = 'agent_log.txt'
          output_path = 'Final_Audit_Postman.json'

          if os.path.exists(log_path):
              with open(log_path, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              json_data = find_json(content)
              if json_data:
                  try:
                      # Validasi sebelum tulis
                      parsed = json.loads(json_data)
                      with open(output_path, 'w') as f:
                          json.dump(parsed, f, indent=4)
                      print("✅ JSON Berhasil diekstrak dan divalidasi.")
                      sys.exit(0)
                  except:
                      print("⚠️ JSON ditemukan tapi malformed.")
          
          # Jika file sudah dibuat langsung oleh agent (seperti perintah di prompt)
          if os.path.exists(output_path):
              print("✅ File sudah dibuat langsung oleh agent.")
              sys.exit(0)
          
          print("❌ Gagal menemukan hasil audit.")
          sys.exit(1)
          EOF

      ## 7. UPLOAD
      - name: Upload Audit Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-audit-results
          path: |
            Final_Audit_Postman.json
            agent_log.txt
