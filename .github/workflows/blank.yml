name: Pro AI APK Auditor - Deep Endpoint Extraction

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit-pro:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      ## 1. SETUP (Tetap sama)
      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 python3-pip jq curl
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx

      ## 2. FETCH APK
      - name: Fetch Target APK
        run: |
          curl -L -o target.apk "https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sports.apk" # <--- Ganti Ini

      ## 3. DECOMPILE
      - name: Decompile
        run: |
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      ## 4. PRO CONTEXT EXTRACTION (THE MAGIC)
      - name: Smart Filter & Extraction
        run: |
          python3 - << 'EOF'
          import os, json, re
          
          source_dir = 'extracted_source/sources'
          context = {"target_app_logic": []}
          
          # Daftar folder yang HARUS diabaikan (SDK Sampah)
          blacklist = [
              'com/google', 'com/facebook', 'androidx', 'com/android', 
              'kotlin', 'okhttp3', 'retrofit2', 'com/google/android',
              'com/google/firebase', 'com/instabug', 'com/adjust'
          ]

          for root, _, files in os.walk(source_dir):
              # Skip folder blacklist
              if any(b in root.replace('\\', '/') for b in blacklist):
                  continue
                  
              for file in files:
                  if file.endswith(('.java', '.kt')):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              lines = f.readlines()
                              
                              # Hanya ambil baris yang relevan (Endpoint/URL/Auth)
                              relevant_lines = []
                              is_interesting = False
                              for line in lines:
                                  line = line.strip()
                                  if any(k in line for k in ['@GET', '@POST', '@PUT', '@DELETE', 'BASE_URL', 'http://', 'https://', 'X-API-KEY', 'Authorization']):
                                      relevant_lines.append(line)
                                      is_interesting = True
                              
                              if is_interesting:
                                  # Ambil maksimal 100 baris relevan per file agar tidak overload
                                  context["target_app_logic"].append({
                                      "file": os.path.relpath(path, source_dir),
                                      "logic": "\n".join(relevant_lines[:100])
                                  })
                      except: continue

          with open('ai_input.json', 'w') as f:
              json.dump(context, f, indent=2)
          EOF

    ## 5. SETUP BUN & AI RUNNER
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: AI Audit & Postman Generation
        run: |
          # Install tool AI
          bun install -g opencode-ai
          
          # Generate prompt secara dinamis
          python3 -c "
          import json, os
          if not os.path.exists('ai_input.json'):
              print('❌ File ai_input.json tidak ditemukan!'); exit(1)
              
          ctx = open('ai_input.json').read()
          prompt = (
              'Konteks: Kamu adalah Senior Penetration Tester.\n'
              'Analisis baris kode berikut yang diambil dari logika internal aplikasi.\n'
              'Tugas:\n'
              '1. Temukan Base URL yang unik untuk aplikasi ini.\n'
              '2. List semua endpoint path beserta method (GET/POST) dan parameter.\n'
              '3. Identifikasi header custom atau pola token auth.\n\n'
              'Output harus 100% JSON Postman Collection V2.1. Tanpa teks pembuka/penutup.\n'
              'Input Kode:\n' + ctx[:35000]
          )
          open('prompt.txt', 'w').write(prompt)
          "
          
          # Jalankan AI dan simpan hasilnya
          opencode run "$(cat prompt.txt)" > raw_ai_output.json
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: pro-audit-results
          path: Final_Audit_Postman.json
