name: AI APK Auditor - Sofascore Direct Analysis

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit-sofascore:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      ## 1. SETUP TOOLS
      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 python3-pip jq curl
          # JADX Decompiler (The Core Engine)
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx

      ## 2. DOWNLOAD APK (DIRECT LINK)
      - name: Fetch Sofascore APK
        run: |
          echo ">>> Mendownload Sofascore APK dari KilatStorage..."
          curl -L -o sofascore.apk "https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sports.apk"
          if [ ! -s sofascore.apk ]; then
            echo "❌ Download gagal atau file kosong!"
            exit 1
          fi
          echo "✅ Download berhasil: $(ls -lh sofascore.apk | awk '{print $5}')"

      ## 3. DECOMPILE (BONGKAR SOURCE CODE)
      - name: Decompile Source Code
        run: |
          echo ">>> Memulai JADX (DEX to Java)..."
          jadx sofascore.apk -d extracted_source --no-res --show-bad-code --threads-count 4
          echo "✅ Dekompilasi selesai."

      ## 4. SMART CONTEXT EXTRACTION (FILTERING)
      - name: Build AI Context
        run: |
          python3 - << 'EOF'
          import os, json, re
          source_dir = 'extracted_source'
          context = {"api_logic": [], "endpoints_found": []}
          
          # Fokus pada file yang mengandung logika networking Sofascore
          # Biasanya menggunakan Retrofit, GSON, atau OkHttp
          for root, _, files in os.walk(source_dir):
              for file in files:
                  if file.endswith(('.java', '.kt')):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              content = f.read()
                              # Cari file yang mendefinisikan API Call atau Base URL
                              if any(k in content for k in ['sofascore', 'api/', 'retrofit2', '@GET', '@POST']):
                                  context["api_logic"].append({
                                      "file": file,
                                      "snippet": content[:8000] # Ambil 8rb karakter agar tidak overload token
                                  })
                      except: continue
          
          with open('ai_input.json', 'w') as f:
              json.dump(context, f, indent=2)
          EOF

      ## 5. AI RUNNER (DEEP AUDIT)
      - name: Setup Bun & AI Runner
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: AI Audit & Postman Generation
        run: |
          bun install -g opencode-ai
          
          python3 -c "
          import json
          ctx = open('ai_input.json').read()
          prompt = (
              'Kamu adalah Elite API Security Researcher.\n'
              'Analisis kode dari APK Sofascore ini. Temukan:\n'
              '1. Base URL (Production & Staging jika ada).\n'
              '2. Semua Endpoint.\n'
              '3. Header wajib (X-So-Auth, dll) dan API Keys.\n\n'
              'Buatlah Postman Collection V2.1 dalam JSON MURNI:\n' + ctx[:35000]
          )
          open('prompt.txt', 'w').write(prompt)
          "
          opencode run "$(cat prompt.txt)" > raw_ai_output.json
## 6. CLEANUP & PARSING JSON
      - name: Finalize Postman Collection
        run: |
          python3 - << 'EOF'
          import re, json, sys

          def extract_json(text):
              # Strategy 1: Look for Markdown JSON blocks
              match = re.search(r'```json\s+(.*?)\s+```', text, re.DOTALL)
              if match:
                  return match.group(1)
              
              # Strategy 2: Look for any content between the first { and last }
              # This handles cases where the AI adds text before or after the JSON
              start = text.find('{')
              end = text.rfind('}')
              if start != -1 and end != -1:
                  return text[start:end+1]
              
              return None

          try:
              with open('raw_ai_output.json', 'r', encoding='utf-8') as f:
                  raw_content = f.read()

              json_str = extract_json(raw_content)
              if not json_str:
                  print("❌ No JSON found in output.")
                  sys.exit(1)

              # Validate that it's actually valid JSON
              data = json.loads(json_str)
              
              with open('Sofascore_API_Audit.postman_collection.json', 'w') as f:
                  json.dump(data, f, indent=4)
              
              print("✅ Postman Collection isolated and saved!")
          except json.JSONDecodeError as e:
              print(f"❌ JSON is malformed: {e}")
              # Print the first 200 chars to see what went wrong
              print(f"Snippet: {json_str[:200]}...") 
              sys.exit(1)
          except Exception as e:
              print(f"❌ Error: {e}")
              sys.exit(1)
          EOF
      ## 7. ARTIFACTS (SIMPAN HASIL)
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sofascore-audit-results
          path: |
            Sofascore_API_Audit.postman_collection.json
            ai_input.json
