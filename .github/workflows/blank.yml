name: Extract API from APK

on:
  push:
    branches: [ main ]

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install deps
        run: sudo apt update && sudo apt install -y curl unzip python3

      # -----------------------
      # 1) Download APK (fail-fast + retry)
      # -----------------------

      - name: Download APK (with UA)
        run: |
          set -e
      
          URL="https://d.apkpure.com/b/APK/com.yahoo.mobile.client.android.finance"
      
          curl -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            -o app.apk "$URL"
      
          ls -lh app.apk
          file app.apk

      # -----------------------
      # 2) Install JADX (stable URL)
      # -----------------------
      - name: Install JADX
        run: |
          set -e

          URL="https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip"
          curl -fL --retry 3 --retry-delay 2 -o jadx.zip "$URL"

          ls -lh jadx.zip
          file jadx.zip

          size=$(stat -c%s jadx.zip)
          if [ "$size" -lt 5000000 ]; then
            echo "Download JADX gagal"
            exit 1
          fi

          unzip -q jadx.zip

          echo "=== JADX CONTENT ==="
          ls -lah

          test -f bin/jadx || (echo "jadx binary tidak ditemukan" && exit 1)
          chmod +x bin/jadx

      # -----------------------
      # 3) Decompile
      # -----------------------
      - name: Decompile APK
        run: |
          set -e
          ./bin/jadx -d out app.apk
          echo "=== OUT DIR ==="
          ls -lah out

      # -----------------------
      # 4) Extract endpoints
      # -----------------------
      - name: Extract endpoints
        run: |
          grep -RhoE "https?://[^\" ]+" out | sort -u > urls.txt || true
          echo "TOTAL URL:"
          wc -l urls.txt
          head -n 50 urls.txt

      # -----------------------
      # 5) Convert to JSON
      # -----------------------
      - name: Convert to JSON
        run: |
          python3 -c "import json; print(json.dumps({'urls':[l.strip() for l in open('urls.txt')]}))" > endpoints.json

      # -----------------------
      # 6) Upload result
      # -----------------------
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: endpoints
          path: endpoints.json
