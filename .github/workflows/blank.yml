name: Dump APK via Emulator

on:
  push:
    branches:
      - main

jobs:
  emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip curl openjdk-17-jdk

      # =========================
      # Setup Android SDK (FIXED)
      # =========================
      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip -d tmp

          mkdir -p cmdline-tools/latest
          mv tmp/cmdline-tools/* cmdline-tools/latest/

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$HOME/android-sdk/emulator" >> $GITHUB_ENV

      # =========================
      # Set AVD Path (IMPORTANT)
      # =========================
      - name: Set AVD path
        run: |
          mkdir -p $HOME/.android/avd
          echo "ANDROID_AVD_HOME=$HOME/.android/avd" >> $GITHUB_ENV

      # =========================
      # Install SDK + System Image
      # =========================
      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "emulator" \
            "platforms;android-30" \
            "system-images;android-30;google_apis;x86_64"

      # =========================
      # Create AVD (DEBUG SAFE)
      # =========================
      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            -n test \
            -k "system-images;android-30;google_apis;x86_64" \
            --force

          echo "=== LIST AVD ==="
          emulator -list-avds

          echo "=== AVD DIR ==="
          ls -lah $HOME/.android/avd

      # =========================
      # Start Emulator (FIXED)
      # =========================
      - name: Start emulator
        run: |
          emulator -list-avds

          nohup emulator @test \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -gpu off \
            -accel off \
            -no-snapshot \
            > emulator.log 2>&1 &

          adb wait-for-device

      # =========================
      # Wait boot complete
      # =========================
      - name: Wait boot complete
        run: |
          adb wait-for-device
          adb shell 'while [[ "$(getprop sys.boot_completed)" != "1" ]]; do sleep 2; done'
          adb shell input keyevent 82

      # =========================
      # Download APK
      # =========================
      - name: Download APK
        run: |
          wget --content-disposition -O app.apk "https://finance.en.uptodown.com/android/download"

          echo "=== FILE INFO ==="
          file app.apk
          ls -lh

      # =========================
      # Install APK
      # =========================
      - name: Install APK
        run: |
          adb install -r app.apk

      # =========================
      # Dump APK path
      # =========================
      - name: Dump APK path
        run: |
          adb shell pm path com.yahoo.mobile.client.android.finance

      # =========================
      # Pull APK(s)
      # =========================
      - name: Pull APK(s)
        run: |
          pkg="com.yahoo.mobile.client.android.finance"
          adb shell pm path $pkg | sed 's/package://g' | while read line; do
            adb pull "$line"
          done

      # =========================
      # Debug output
      # =========================
      - name: List dumped files
        run: |
          ls -lah

      # =========================
      # Upload result
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dumped-apk
          path: "*.apk"
