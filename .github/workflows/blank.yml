name: Extract API from APK

on:
  push:
    branches: [ main ]

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Install deps
        run: sudo apt update && sudo apt install -y curl unzip python3

      - name: Download APK
        run: curl -L -o app.apk https://finance.en.uptodown.com/android/download && file app.apk
    
      - name: Install JADX
        run: |
          set -e
      
          URL="https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip"
      
          echo "Downloading JADX..."
          curl -fL --retry 3 --retry-delay 2 -o jadx.zip "$URL"
      
          echo "=== CHECK FILE ==="
          ls -lh jadx.zip
          file jadx.zip
      
          # validasi file (harus zip + >5MB)
          file jadx.zip | grep -q "Zip archive" || (echo "Bukan zip" && exit 1)
          [ $(stat -c%s jadx.zip) -gt 5000000 ] || (echo "File terlalu kecil" && exit 1)
      
          unzip -q jadx.zip
      
          echo "=== CONTENT ==="
          ls -lah
      
          # pastikan binary ada
          test -f jadx-1.5.0/bin/jadx || (echo "jadx tidak ditemukan" && exit 1)
      
      - name: Decompile APK
        run: |
          set -e
      
          ./jadx-1.5.0/bin/jadx -d out app.apk
      
          echo "=== RESULT ==="
          ls -lah out

      - name: Extract endpoints
        run: grep -RhoE "https?://[^\" ]+" out | sort -u > urls.txt || true

      - name: Convert to JSON
        run: python3 -c "import json; print(json.dumps({'urls':[l.strip() for l in open('urls.txt')]}))" > endpoints.json

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: endpoints
          path: endpoints.json
