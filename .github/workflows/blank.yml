name: AI APK Auditor Pro - Sofascore 200-OK Edition

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  parallel-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      ## 1. ENV SETUP
      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 python3-pip jq curl
          # JADX Decompiler
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx
          # Bun & OpenCode
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      ## 2. FETCH APK (DIRECT LINK)
      - name: Download Sofascore APK
        run: |
          curl -L -o sofascore.apk "https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sofascore.apk"
          echo "✅ APK Ready."

      ## 3. DECOMPILE (DEEP SCAN)
      - name: Decompile
        run: |
          # --show-bad-code dipaksa agar AI bisa liat logika yang obfuscated
          jadx sofascore.apk -d extracted_source --no-res --show-bad-code --threads-count 4
          echo "✅ Decompile Finished."

      ## 4. SMART SEGMENTATION & MASTER PROMPT
      - name: Prepare Anti-404 Prompts
        run: |
          python3 - << 'EOF'
          import os, json
          source_dir = 'extracted_source'
          files_context = []
          
          # Scan file Java/Kotlin yang berhubungan dengan Network
          for root, _, files in os.walk(source_dir):
              for file in files:
                  if file.endswith(('.java', '.kt')):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              content = f.read()
                              # Cari file yang mengandung keyword krusial
                              if any(k in content for k in ['retrofit', 'OkHttpClient', 'Interceptor', 'X-So-', 'Authorization']):
                                  files_context.append({"file": file, "content": content[:7000]})
                      except: continue

          def create_agent_prompt(name, task_focus):
              instruction = (
                  f"Tugasmu: {task_focus}\n"
                  "RULES UNTUK 200 OK:\n"
                  "1. Cari 'HeaderInterceptor' untuk menemukan Header wajib (X-So-Auth, X-App-Version).\n"
                  "2. Identifikasi Base URL yang aktif (api.sofascore.com/v1 atau /v2).\n"
                  "3. Gunakan placeholder {{eventId}} atau {{teamId}} daripada menebak angka.\n"
                  "4. Cari Query Params wajib (?lang=en, ?utcOffset=420).\n"
                  "OUTPUT: Hanya JSON Array untuk Postman 'item'."
              )
              prompt = {"instruction": instruction, "context": files_context[:25]} # Slice context per agent
              with open(f'prompt_{name}.json', 'w') as f:
                  json.dump(prompt, f)

          # Bagi tugas ke 4 Agent
          create_agent_prompt("security", "Cari Auth Logic, Header Interceptor, dan API Keys.")
          create_agent_prompt("matches", "Cari Endpoint Live Score, Lineups, dan Match Detail.")
          create_agent_prompt("stats", "Cari Endpoint Statistik Pemain, Klasemen, dan Transfer.")
          create_agent_prompt("gql", "Cari GraphQL Queries dan Mutations di /graphql.")
          EOF

      ## 5. PARALLEL EXECUTION
      - name: Run Orchestrator
        run: |
          ~/.bun/bin/bun install -g opencode-ai
          echo ">>> Launching Agents..."
          ~/.bun/bin/opencode run "$(cat prompt_security.json)" > res_auth.json &
          ~/.bun/bin/opencode run "$(cat prompt_matches.json)" > res_matches.json &
          ~/.bun/bin/opencode run "$(cat prompt_stats.json)" > res_stats.json &
          ~/.bun/bin/opencode run "$(cat prompt_gql.json)" > res_gql.json &
          wait
          echo "✅ Agents work done."

      ## 6. SMART MERGE (FIXING HEADERS)
      - name: Merge & Fix Collection
        run: |
          python3 - << 'EOF'
          import json, re, os

          def extract_json_array(filename):
              if not os.path.exists(filename): return []
              content = open(filename).read()
              match = re.search(r'\[.*\]', content, re.DOTALL)
              return json.loads(match.group(0)) if match else []

          all_items = []
          for f in ['res_auth.json', 'res_matches.json', 'res_stats.json', 'res_gql.json']:
              all_items.extend(extract_json_array(f))

          # Tambahkan Header Global ke setiap request agar 200 OK
          for item in all_items:
              if 'request' in item:
                  item['request']['header'] = item['request'].get('header', [])
                  # Tambahkan header standar Sofascore yang sering diminta
                  item['request']['header'].append({"key": "User-Agent", "value": "SofascoreAndroid/3.2.1"})
                  item['request']['header'].append({"key": "X-So-Client", "value": "Android"})

          final_collection = {
              "info": {
                  "name": "Sofascore 200-OK Audit",
                  "schema": "https://schema.getpostman.com/json/collection/v2.1.0/collection.json"
              },
              "item": all_items,
              "variable": [
                  {"key": "baseUrl", "value": "https://api.sofascore.com"},
                  {"key": "eventId", "value": "1234567"},
                  {"key": "teamId", "value": "1234"}
              ]
          }

          with open('Sofascore_Audit_Result.json', 'w') as f:
              json.dump(final_collection, f, indent=4)
          EOF

      ## 7. SAVE ARTIFACT
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: sofascore-api-audit
          path: Sofascore_Audit_Result.json
