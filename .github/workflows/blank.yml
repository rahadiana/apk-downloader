name: Extract API from APK

on:
  push:
    branches: [ main ]

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y unzip curl python3

      # -----------------------
      # 1. Load APK (NO INTERNET)
      # -----------------------
      - name: Prepare APK
        run: |
          set -e

          cp apk/yahoo.apk app.apk

          echo "=== APK INFO ==="
          ls -lh app.apk
          file app.apk

          # VALIDASI APK
          file app.apk | grep -q "Zip archive" || (echo "APK tidak valid" && exit 1)

          unzip -l app.apk | grep -q "classes.dex" || (echo "Tidak ada classes.dex" && exit 1)

      # -----------------------
      # 2. Install JADX (STABLE)
      # -----------------------
      - name: Install JADX
        run: |
          set -e

          curl -fL --retry 3 -o jadx.zip \
          https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip

          unzip -q jadx.zip

          echo "=== CHECK JADX ==="
          ls -lah

          test -f bin/jadx || (echo "jadx tidak ditemukan" && exit 1)
          chmod +x bin/jadx

      # -----------------------
      # 3. Decompile
      # -----------------------
      - name: Decompile APK
        run: |
          set -e

          mkdir -p out

          ./bin/jadx -d out app.apk

          echo "=== OUT DIR ==="
          ls -lah out || (echo "out kosong" && exit 1)

      # -----------------------
      # 4. Extract endpoint
      # -----------------------
      - name: Extract endpoints
        run: |
          grep -RhoE "https?://[^\" ]+" out | sort -u > urls.txt || true

          echo "TOTAL URL:"
          wc -l urls.txt
          head -n 50 urls.txt

      # -----------------------
      # 5. Convert JSON
      # -----------------------
      - name: Convert to JSON
        run: |
          python3 -c "import json; print(json.dumps({'urls':[l.strip() for l in open('urls.txt')]}))" > endpoints.json

      # -----------------------
      # 6. Upload result
      # -----------------------
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: endpoints
          path: endpoints.json
