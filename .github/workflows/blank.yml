name: Extract API from APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y unzip python3 default-jre-headless

      - name: Download APK
        run: |
          curl -fL --retry 3 \
            -H "Accept: application/vnd.git-lfs+json" \
            -o app.apk \
            "https://media.githubusercontent.com/media/rahadiana/apk-downloader/main/ini.apk"
          
          ls -lh app.apk
          file app.apk
          file app.apk | grep -q "Zip archive" || { echo "❌ Bukan APK valid"; exit 1; }
          unzip -l app.apk | grep -q "classes.dex" || { echo "❌ Tidak ada dex"; exit 1; }
          echo "✅ APK valid"

      - name: Install JADX
        run: |
          curl -fL --retry 3 -o jadx.zip \
            https://github.com/skylot/jadx/releases/download/v1.5.1/jadx-1.5.1.zip
          unzip -q jadx.zip -d jadx-dist
          chmod +x jadx-dist/bin/jadx

      - name: Decompile
        run: |
          mkdir -p out
          export JAVA_OPTS="-Xmx4g"
          jadx-dist/bin/jadx --threads-count 4 --no-res -d out app.apk
          echo "Total .java: $(find out -name '*.java' | wc -l)"

      - name: Extract endpoints
        run: |
          grep -RhoE 'https?://[^"'\'' \t\n\r<>{}|\\^`]+' out/ \
            | grep -vE '(schemas\.android\.com|w3\.org|apache\.org|xmlns|example\.com)' \
            | sort -u > urls.txt || true
          echo "Total URL: $(wc -l < urls.txt)"
          head -50 urls.txt

      - name: Convert to JSON
        run: |
          python3 - << 'EOF'
          import json
          with open("urls.txt") as f:
              urls = [l.strip() for l in f if l.strip()]
          out = {"total": len(urls), "urls": urls, "by_domain": {}}
          for url in urls:
              try:
                  d = url.split("/")[2]
                  out["by_domain"].setdefault(d, []).append(url)
              except: pass
          json.dump(out, open("endpoints.json","w"), indent=2)
          print(f"✅ {len(urls)} URLs saved")
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: endpoints-${{ github.run_number }}
          path: |
            endpoints.json
            urls.txt
          retention-days: 30

      - name: Summary
        run: |
          echo "## 📊 Hasil Ekstraksi" >> $GITHUB_STEP_SUMMARY
          echo "- **Total URL:** $(wc -l < urls.txt)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -20 urls.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
