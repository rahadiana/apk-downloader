name: Agentic APK Auditor - Hybrid Stable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agentic-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      ## 1. SETUP TOOLS
      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 jq curl grep
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx

      ## 2. FETCH APK
      - name: Fetch Target APK
        run: |
          curl -L -o target.apk "https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sports.apk"
          if [ ! -s target.apk ]; then echo "❌ Download gagal!"; exit 1; fi

      ## 3. DECOMPILE
      - name: Decompile APK
        run: |
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      ## 4. PRE-AUDIT MAPPING
      - name: Map API Structure
        run: |
          mkdir -p audit_hints
          cd extracted_source/sources || exit 1
          grep -rE "@GET|@POST|BASE_URL|http|https" . | head -n 100 > ../../audit_hints/api_hints.txt || true
          find . -maxdepth 5 -name "*Api*" -o -name "*Service*" > ../../audit_hints/file_map.txt || true
          cd ../..

      ## 5. SETUP BUN
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
## 6. AGENTIC AI ANALYSIS (NO-KEY MODE)
      - name: Agentic Deep Audit
        run: |
          bun install -g opencode-ai
          
          cat << 'EOF' > agent_instruction.txt
          Analyze the code in 'extracted_source/sources'. 
          Map all API endpoints found in files matching '*Api*' or '*Service*'.
          Return ONLY a valid Postman Collection V2.1 JSON.
          EOF

          # Kita jalankan tanpa env OPENAI_API_KEY
          # Pastikan flag --dangerously-skip-permissions tetap ada agar tidak macet
          opencode run "$(cat agent_instruction.txt)" \
            --dangerously-skip-permissions \
            --format json \
            --path . > agent_log.txt 2>&1 || echo "AI Process Finished"

      ## 7. FINAL EXTRACTION (LEBIH KUAT)
      - name: Finalize Result
        run: |
          python3 - << 'EOF'
          import json, os, sys, re

          log_path = 'agent_log.txt'
          output_path = 'Final_Audit_Postman.json'

          if not os.path.exists(log_path):
              sys.exit(1)

          with open(log_path, 'r', encoding='utf-8') as f:
              content = f.read()

          # AI tanpa Key seringkali memberikan pesan error di awal, 
          # kita cari JSON yang benar-benar valid saja
          json_pattern = re.compile(r'(\{.*\})', re.DOTALL)
          matches = json_pattern.findall(content)
          
          for match in reversed(matches): # Ambil dari yang paling akhir
              try:
                  data = json.loads(match)
                  if "info" in data and "item" in data: # Cek struktur Postman
                      with open(output_path, 'w') as f:
                          json.dump(data, f, indent=4)
                      print("✅ Sukses mengekstrak Postman Collection.")
                      sys.exit(0)
              except:
                  continue
          
          print("❌ Tidak ditemukan JSON Postman yang valid di log.")
          sys.exit(1)
          EOF
      ## 8. UPLOAD
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            Final_Audit_Postman.json
            agent_log.txt
            audit_hints/
