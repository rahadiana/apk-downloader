name: Agentic APK Auditor - Hybrid Stable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agentic-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      ## 1. SETUP TOOLS
      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 jq curl grep
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx

      ## 2. FETCH APK
      - name: Fetch Target APK
        run: |
          curl -L -o target.apk "https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sports.apk"
          if [ ! -s target.apk ]; then echo "❌ Download gagal!"; exit 1; fi

      ## 3. DECOMPILE
      - name: Decompile APK
        run: |
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      ## 4. PRE-AUDIT MAPPING
      - name: Map API Structure
        run: |
          mkdir -p audit_hints
          cd extracted_source/sources || exit 1
          # Ambil 100 baris pertama saja agar prompt tidak terlalu panjang (menghindari error tanpa key)
          grep -rE "@GET|@POST|BASE_URL|http|https" . | head -n 100 > ../../audit_hints/api_hints.txt || true
          find . -maxdepth 5 -name "*Api*" -o -name "*Service*" > ../../audit_hints/file_map.txt || true
          cd ../..

      ## 5. SETUP BUN
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      ## 6. AGENTIC AI ANALYSIS (NO-KEY MODE)
      - name: Agentic Deep Audit
        run: |
          bun install -g opencode-ai
          
          cat << 'EOF' > agent_instruction.txt
          TASK: Create a Postman Collection V2.1 JSON based on the API endpoints found in 'extracted_source/sources'.
          Return ONLY the JSON object. Do not include any notes or explanations.
          EOF

          # Jalankan tanpa API KEY
          # Tambahkan --pure jika tersedia untuk mengurangi noise log
          opencode run "$(cat agent_instruction.txt)" \
            --dangerously-skip-permissions \
            --format json \
            --path . > agent_log.txt 2>&1 || echo "AI Process Finished"

      ## 7. FINAL EXTRACTION (PERBAIKAN STREAM PARSING)
      - name: Finalize Result
        run: |
          python3 - << 'EOF'
          import json, os, sys, re

          log_path = 'agent_log.txt'
          output_path = 'Final_Audit_Postman.json'

          if not os.path.exists(log_path):
              print("❌ Log file missing")
              sys.exit(1)

          with open(log_path, 'r', encoding='utf-8') as f:
              lines = f.readlines()

          # Gabungkan hanya field 'content' dari log stream JSON opencode
          full_ai_response = ""
          for line in lines:
              try:
                  entry = json.loads(line)
                  if isinstance(entry, dict) and 'content' in entry:
                      full_ai_response += entry['content']
              except:
                  # Jika baris bukan JSON (misal log install), abaikan
                  continue

          if not full_ai_response:
              # Fallback: jika --format json gagal, gunakan konten mentah
              full_ai_response = "".join(lines)

          # Cari blok JSON Postman ({ ... })
          # Kita cari kurung kurawal terluar yang mengandung "info" dan "item"
          json_pattern = re.compile(r'(\{.*\})', re.DOTALL)
          matches = json_pattern.findall(full_ai_response)
          
          found_valid = False
          for match in reversed(matches):
              try:
                  data = json.loads(match)
                  if isinstance(data, dict) and "info" in data and "item" in data:
                      with open(output_path, 'w') as f:
                          json.dump(data, f, indent=4)
                      print("✅ Sukses: Postman Collection berhasil dibuat.")
                      found_valid = True
                      break
              except:
                  continue
          
          if not found_valid:
              print("❌ Gagal: AI tidak memberikan JSON Postman yang utuh.")
              print("Preview response AI:")
              print(full_ai_response[:500] + "...")
              sys.exit(1)
          EOF

      ## 8. UPLOAD
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            Final_Audit_Postman.json
            agent_log.txt
            audit_hints/
