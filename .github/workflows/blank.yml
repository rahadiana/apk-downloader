name: AI APK Auditor - Auto Web Navigation Mode

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit-process:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      ## 1. SETUP TOOLS & BROWSER
      - name: Install Forensic Tools & Playwright
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 python3-pip jq
          # Install JADX
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx
          # Setup Playwright untuk navigasi web
          pip install playwright
          playwright install chromium --with-deps

      ## 2. NAVIGASI WEB OTOMATIS (DOWNLOAD APK)
      - name: Download APK via Web Navigation
        run: |
          python3 - << 'EOF'
          import asyncio
          from playwright.async_api import async_playwright

          async def run():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  page = await browser.new_page()
                  
                  # Navigasi ke situs penyedia APK (Contoh: APKCombo atau sejenisnya)
                  print("Navigasi ke downloader...")
                  # Kita gunakan link direct generator agar lebih stabil
                  target_url = "https://apkpure.com/id/tribunnews-indonesia-local-news/mobile.android.tribun/download"
                  
                  await page.goto(target_url, wait_until="networkidle")
                  
                  # Klik tombol download (Selector ini mungkin perlu disesuaikan jika web berubah)
                  print("Mencari tombol download...")
                  async with page.expect_download() as download_info:
                      # Mencari link yang mengandung .apk
                      await page.click("a.download-start-btn") 
                  
                  download = await download_info.value
                  await download.save_as("tribun.apk")
                  print(f"✅ Berhasil mendownload: {download.suggested_filename}")
                  await browser.close()

          asyncio.run(run())
          EOF

      ## 3. DECOMPILE (BONGKAR KODE)
      - name: Decompile Source Code
        run: |
          jadx tribun.apk -d extracted_source --no-res --show-bad-code --threads-count 4
          echo "✅ Dekompilasi selesai."

      ## 4. EKSTRAKSI KONTEKS UNTUK AI
      - name: Build AI Context
        run: |
          python3 - << 'EOF'
          import os, re, json
          source_dir = 'extracted_source'
          context = {"api_logic": [], "hardcoded_secrets": []}
          
          for root, _, files in os.walk(source_dir):
              for file in files:
                  if file.endswith(('.java', '.kt')):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              content = f.read()
                              if any(k in content for k in ['tribunnews', 'api', 'retrofit', 'endpoint']):
                                  context["api_logic"].append({
                                      "file": file,
                                      "snippet": content[:8000]
                                  })
                      except: continue
          
          with open('ai_input.json', 'w') as f:
              json.dump(context, f, indent=2)
          EOF

      ## 5. ANALISIS AI & GENERATE POSTMAN
      - name: Setup Bun & AI
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: AI Audit
        run: |
          bun install -g opencode-ai
          python3 -c "
          ctx = open('ai_input.json').read()
          prompt = f'Kamu adalah expert API security. Dari kode APK Tribunnews ini, temukan Base URL dan semua endpoint berita. Buat Postman Collection V2.1 JSON Murni:\n{ctx[:30000]}'
          open('prompt.txt', 'w').write(prompt)
          "
          opencode run "$(cat prompt.txt)" > raw_output.json

      ## 6. CLEANUP & SAVE POSTMAN JSON
      - name: Finalize Postman Collection
        run: |
          python3 - << 'EOF'
          import re, json, sys
          try:
              content = open('raw_output.json').read()
              match = re.search(r'(\{.*\})', content, re.DOTALL)
              if match:
                  data = json.loads(match.group(1))
                  with open('Tribunnews_Audit.postman_collection.json', 'w') as f:
                      json.dump(data, f, indent=4)
                  print("✅ Postman Collection berhasil dibuat!")
              else: sys.exit(1)
          except: sys.exit(1)
          EOF

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tribun-api-results
          path: Tribunnews_Audit.postman_collection.json
