name: Extract & Test API from APK (AI Deep Analysis)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y unzip python3 python3-pip curl jq

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install opencode
        run: |
          bun install -g opencode-ai
          sleep 5

      - name: Install Python deps
        run: |
          pip install androguard --quiet

      - name: Download APK
        run: |
          curl -fL --retry 3 \
            -o app.apk \
            "https://raw.githubusercontent.com/rahadiana/apk-downloader/refs/heads/main/ini.apk"
          unzip -t app.apk > /dev/null 2>&1 || { echo "❌ Tidak bisa di-unzip"; exit 1; }
          unzip -l app.apk | grep -q "classes.dex" || { echo "❌ Tidak ada dex"; exit 1; }
          echo "✅ APK valid — $(ls -lh app.apk | awk '{print $5}')"

      - name: Extract strings from DEX (fast)
        run: |
          mkdir -p dex_files ai_input
          echo ">>> Ekstrak file DEX dari APK..."
          unzip -o app.apk "*.dex" -d dex_files/
          ls -lh dex_files/
          echo ">>> Parsing DEX strings..."
          python3 - << 'EOF'
          import os, re, json, subprocess

          all_strings = set()
          dex_dir = "dex_files"

          try:
              from androguard.core.bytecodes.dvm import DalvikVMFormat
              for dex_file in sorted(os.listdir(dex_dir)):
                  if not dex_file.endswith(".dex"):
                      continue
                  print(f"  Processing {dex_file}...")
                  try:
                      with open(f"{dex_dir}/{dex_file}", "rb") as f:
                          d = DalvikVMFormat(f.read())
                      for s in d.get_strings():
                          all_strings.add(str(s))
                  except Exception as e:
                      print(f"    skip: {e}")
          except ImportError:
              print("  Androguard tidak tersedia, pakai strings command...")
              for dex_file in sorted(os.listdir(dex_dir)):
                  if not dex_file.endswith(".dex"):
                      continue
                  result = subprocess.run(
                      ["strings", "-n", "4", f"{dex_dir}/{dex_file}"],
                      capture_output=True, text=True
                  )
                  for line in result.stdout.splitlines():
                      all_strings.add(line.strip())

          print(f"\n  Total strings: {len(all_strings)}")

          urls         = set()
          api_paths    = set()
          base_urls    = set()
          auth_strings = set()
          host_strings = set()
          interesting  = set()

          URL_RE   = re.compile(r'^https?://.{4,}')
          PATH_RE  = re.compile(r'^/(?:api|v\d|rest|service|endpoint|graphql|query|auth|oauth|user|account|finance|market|stock|quote|search|data|feed)[/\w\-\.%{}]*', re.I)
          PATH2_RE = re.compile(r'^/[a-zA-Z][a-zA-Z0-9_\-/\.]{4,}$')
          HOST_RE  = re.compile(r'^[a-z0-9\-]+\.[a-z]{2,}(?:\.[a-z]{2,})?$')

          for s in all_strings:
              s = s.strip()
              if not s or len(s) < 3:
                  continue
              if URL_RE.match(s):
                  urls.add(s)
                  if not any(c in s[8:] for c in ['?', '{', ' ', '\n']):
                      if s.count('/') <= 4:
                          base_urls.add(s.rstrip('/'))
              elif PATH_RE.match(s):
                  api_paths.add(s)
              elif PATH2_RE.match(s) and len(s) > 5:
                  api_paths.add(s)
              elif HOST_RE.match(s) and '.' in s:
                  host_strings.add(s)
              if any(kw in s.lower() for kw in [
                  'bearer','authorization','x-api-key','api_key','apikey',
                  'token','secret','client_id','client_secret','access_key'
              ]):
                  auth_strings.add(s)
              if any(kw in s.lower() for kw in [
                  'retrofit','okhttp','@get','@post','graphql','websocket',
                  'baseurl','base_url','endpoint','hostname','host'
              ]):
                  interesting.add(s)

          data = {
              "total_strings": len(all_strings),
              "urls": sorted(urls),
              "base_urls": sorted(base_urls),
              "api_paths": sorted(api_paths),
              "hosts": sorted(host_strings),
              "auth_strings": sorted(auth_strings),
              "interesting": sorted(interesting),
          }
          with open("ai_input/extracted.json", "w") as f:
              json.dump(data, f, indent=2)

          context = []
          context.append("=== BASE URLs ===")
          context.extend(sorted(base_urls)[:100])
          context.append("\n=== ALL URLs ===")
          context.extend(sorted(urls)[:300])
          context.append("\n=== API PATHS ===")
          context.extend(sorted(api_paths)[:500])
          context.append("\n=== HOSTS ===")
          context.extend(sorted(host_strings)[:100])
          context.append("\n=== AUTH-RELATED STRINGS ===")
          context.extend(sorted(auth_strings)[:100])
          context.append("\n=== INTERESTING STRINGS ===")
          context.extend(sorted(interesting)[:200])

          full = "\n".join(context)
          if len(full) > 80000:
              full = full[:80000]
          with open("ai_input/code_context.txt", "w") as f:
              f.write(full)
          EOF

      - name: AI Round 1 - Deep Endpoint Extraction
        run: |
          python3 -c "
          import json
          code = open('ai_input/code_context.txt').read()
          prompt = (
            'Kamu adalah elite mobile security researcher.\n\n'
            'DATA EKSTRAKSI:\n' + code + '\n\n'
            'LAKUKAN ANALISIS MENDALAM:\n'
            '1. Identifikasi base URL & framework.\n'
            '2. Rekonstruksi endpoint (Base + Path).\n'
            '3. Identifikasi Auth header/keys.\n\n'
            'OUTPUT JSON murni:\n'
            '{\"app_package\":\"\",\"base_urls\":{\"production\":\"\"},\"endpoints\":[{\"method\":\"GET\",\"full_url\":\"\",\"requires_auth\":false}]}'
          )
          open('ai_input/prompt_round1.txt','w').write(prompt)
          "
          opencode run "$(cat ai_input/prompt_round1.txt)" > ai_round1_raw.txt 2>&1

          python3 - << 'PYEOF'
          import re, json
          try:
              raw = open("ai_round1_raw.txt").read()
              match = re.search(r'\{.*\}', raw, re.DOTALL)
              if match:
                  data = json.loads(match.group())
                  json.dump(data, open("ai_endpoints.json","w"), indent=2)
              else:
                  raise ValueError("No JSON found")
          except:
              json.dump({"endpoints":[]}, open("ai_endpoints.json","w"))
          PYEOF

      - name: AI Round 2 - Build Test Cases
        run: |
          python3 -c "
          import json
          eps = open('ai_endpoints.json').read()
          prompt = 'Berdasarkan data ini: ' + eps + ' buat list curl command siap pakai dalam format JSON {\"test_cases\":[{\"name\":\"\",\"curl_command\":\"\"}]}. Gunakan symbol AAPL/BTC-USD untuk finance.'
          open('ai_input/prompt_round2.txt','w').write(prompt)
          "
          opencode run "$(cat ai_input/prompt_round2.txt)" > ai_round2_raw.txt 2>&1

          python3 - << 'PYEOF'
          import re, json
          try:
              raw = open("ai_round2_raw.txt").read()
              match = re.search(r'\{.*\}', raw, re.DOTALL)
              if match:
                  json.dump(json.loads(match.group()), open("ai_test_cases.json","w"), indent=2)
          except:
              json.dump({"test_cases":[]}, open("ai_test_cases.json","w"))
          PYEOF

      - name: Execute API Tests
        run: |
          python3 - << 'PYEOF'
          import json, subprocess, time
          try:
              cases = json.load(open("ai_test_cases.json")).get("test_cases", [])
              results = []
              for case in cases:
                  cmd = case.get("curl_command")
                  if not cmd or "[TOKEN]" in cmd: continue
                  print(f"Testing: {case['name']}")
                  proc = subprocess.run(cmd, shell=True, capture_output=True, text=True, timeout=15)
                  results.append({
                      "name": case['name'],
                      "status_code": proc.stdout.split()[-1] if proc.stdout else "ERR",
                      "success": proc.returncode == 0
                  })
              json.dump({"results": results}, open("test_results.json","w"), indent=2)
          except Exception as e:
              print(f"Error: {e}")
          PYEOF

      - name: AI Round 3 - Final Report
        run: |
          python3 -c "
          import json
          res = open('test_results.json').read()
          prompt = 'Buat laporan eksekutif Markdown dalam Bahasa Indonesia berdasarkan hasil test API ini: ' + res
          open('ai_input/prompt_round3.txt','w').write(prompt)
          "
          opencode run "$(cat ai_input/prompt_round3.txt)" > final_report.md 2>&1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-analysis-report
          path: |
            *.json
            *.md

      - name: GitHub Summary
        run: |
          echo "# 🛡️ API Analysis Summary" >> $GITHUB_STEP_SUMMARY
          cat final_report.md >> $GITHUB_STEP_SUMMARY
