name: Universal API Auditor - Anti-Halu Edition

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Direct Link APK'
        required: false
        default: 'https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sofascore.apk'

jobs:
  audit-dan-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 curl
          # Install JADX
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx
          # Install Bun & OpenCode
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Download & Decompile
        run: |
          APK_URL="${{ github.event.inputs.apk_url }}"
          curl -L -f -o target.apk "$APK_URL"
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      - name: Hard Filtering (Cari yang Beneran API)
        run: |
          python3 - << 'EOF'
          import os
          source_dir = 'extracted_source'
          important_files = []
          # Cari file yang mengandung pola API Retrofit/OkHttp
          patterns = ['@GET(', '@POST(', '@PUT(', '@DELETE(', 'interface']
          
          for root, _, files in os.walk(source_dir):
              for file in files:
                  if file.endswith(('.java', '.kt')):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              content = f.read()
                              if any(p in content for p in patterns):
                                  important_files.append(f"FILE: {file}\n{content[:5000]}")
                      except: continue
          
          # Simpan hanya 25 file paling relevan biar AI gak overload
          with open('context_api.txt', 'w') as f:
              f.write("\n\n".join(important_files[:25]))
          EOF

      - name: AI Extraction (Strict Mode)
        run: |
          ~/.bun/bin/bun install -g opencode-ai
          
          echo "Tugasmu: Ekstrak daftar endpoint API dari kode berikut.
          ATURAN KETAT:
          1. JANGAN bikin JSON.
          2. Tulis dalam format: METHOD | URL | HEADERS
          3. JANGAN berikan penjelasan atau teks tambahan.
          
          CONTOH:
          GET | /api/v1/users | X-Api-Key, Authorization
          POST | /api/v1/login | Content-Type, User-Agent
          
          KODE SUMBER:
          $(cat context_api.txt)" > prompt.txt
          
          cat prompt.txt | ~/.bun/bin/opencode run > raw_list.txt

      - name: Python Architect & Basic Test
        run: |
          python3 - << 'EOF'
          import json, os
          
          endpoints = []
          try:
              with open('raw_list.txt', 'r') as f:
                  for line in f:
                      if '|' in line:
                          parts = [p.strip() for p in line.split('|')]
                          if len(parts) >= 2:
                              endpoints.append({
                                  "method": parts[0],
                                  "url": parts[1],
                                  "headers": parts[2] if len(parts) > 2 else ""
                              })
          except: pass

          # Buat Postman Collection
          postman = {
              "info": {"name": "Audit_Anti_Halu", "schema": "https://schema.getpostman.com/json/collection/v2.1.0/collection.json"},
              "item": []
          }

          print("--- DAFTAR ENDPOINT DITEMUKAN ---")
          for ep in endpoints:
              print(f"[*] {ep['method']} - {ep['url']}")
              
              # Rakit Request
              request_item = {
                  "name": f"{ep['method']} {ep['url']}",
                  "request": {
                      "method": ep['method'],
                      "header": [{"key": h.strip(), "value": "{{token}}"} for h in ep['headers'].split(',') if h.strip()],
                      "url": {"raw": "{{baseUrl}}" + ep['url'], "host": ["{{baseUrl}}"], "path": ep['url'].lstrip('/').split('/')}
                  }
              }
              postman['item'].append(request_item)

          with open('Final_Audit_Result.json', 'w') as f:
              json.dump(postman, f, indent=4)
          EOF

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-list-clean
          path: |
            Final_Audit_Result.json
            raw_list.txt
