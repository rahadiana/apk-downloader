name: Agentic APK Auditor - Hybrid Stable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agentic-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      ## 1. SETUP TOOLS
      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 jq curl grep
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx

      ## 2. FETCH APK
      - name: Fetch Target APK
        run: |
          curl -L -o target.apk "https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sports.apk"
          if [ ! -s target.apk ]; then echo "❌ Download gagal!"; exit 1; fi

      ## 3. DECOMPILE
      - name: Decompile APK
        run: |
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      ## 4. PRE-AUDIT MAPPING
      - name: Map API Structure
        run: |
          mkdir -p audit_hints
          cd extracted_source/sources || exit 1
          # Ambil 100 baris pertama saja agar prompt tidak terlalu panjang (menghindari error tanpa key)
          grep -rE "@GET|@POST|BASE_URL|http|https" . | head -n 100 > ../../audit_hints/api_hints.txt || true
          find . -maxdepth 5 -name "*Api*" -o -name "*Service*" > ../../audit_hints/file_map.txt || true
          cd ../..

      ## 5. SETUP BUN
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

## 6. AGENTIC AI ANALYSIS (FIXED ARGS)
      - name: Agentic Deep Audit
        run: |
          bun install -g opencode-ai
          
          # Buat instruksi simpel
          echo "Create a Postman Collection V2.1 JSON from extracted_source/sources. Return ONLY raw JSON." > agent_instruction.txt

          # Gunakan flag -f untuk memasukkan file instruksi
          # Tambahkan --dangerously-skip-permissions agar tidak stuck
          opencode run \
            --file agent_instruction.txt \
            --dangerously-skip-permissions \
            --format json \
            --path . > agent_log.txt 2>&1 || echo "AI finished"

      ## 7. FINAL EXTRACTION (SMART PARSER)
      - name: Finalize Result
        run: |
          python3 - << 'EOF'
          import json, os, sys, re

          log_path = 'agent_log.txt'
          output_path = 'Final_Audit_Postman.json'

          if not os.path.exists(log_path):
              sys.exit(1)

          with open(log_path, 'r', encoding='utf-8') as f:
              log_data = f.read()

          # 1. Coba ekstrak jika log formatnya JSON Stream
          combined_content = ""
          for line in log_data.splitlines():
              try:
                  item = json.loads(line)
                  if 'content' in item:
                      combined_content += item['content']
              except:
                  continue
          
          # 2. Jika stream kosong, pakai raw log (siapa tahu bukan stream)
          search_target = combined_content if combined_content else log_data

          # 3. Cari blok JSON Postman
          # Cari string yang mengandung "info" dan "item" di dalam kurung kurawal
          match = re.search(r'(\{.*"info".*"item".*\})', search_target, re.DOTALL)
          
          if match:
              try:
                  json_str = match.group(1)
                  # Validasi JSON
                  parsed = json.loads(json_str)
                  with open(output_path, 'w') as f:
                      json.dump(parsed, f, indent=4)
                  print("✅ Sukses: Postman JSON berhasil dibuat.")
                  sys.exit(0)
              except Exception as e:
                  print(f"❌ JSON Malformed: {e}")
          
          print("❌ Gagal: AI tidak memberikan output JSON yang benar.")
          print("Isi log terakhir:")
          print(search_target[-500:])
          sys.exit(1)
          EOF

      ## 8. UPLOAD
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            Final_Audit_Postman.json
            agent_log.txt
            audit_hints/
