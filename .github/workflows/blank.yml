name: AI APK Auditor - Fixed Web Navigation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit-process:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Forensic Tools & Playwright
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 python3-pip jq
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx
          pip install playwright
          playwright install chromium --with-deps

      - name: Download APK via APK-DL (Force Mode)
        run: |
          python3 - << 'EOF'
          import asyncio
          from playwright.async_api import async_playwright

          async def run():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  # Gunakan User Agent Mobile agar website lebih ringan
                  context = await browser.new_context(
                      user_agent="Mozilla/5.0 (Linux; Android 10; SM-G981B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/80.0.3987.162 Mobile Safari/537.36"
                  )
                  page = await context.new_page()
                  
                  print(">>> Membuka Downloader APK-DL...")
                  try:
                      # Navigasi langsung ke halaman package Tribunnews
                      target_url = "https://apk-dl.com/tribunnews-indonesia-local-news/mobile.android.tribun"
                      await page.goto(target_url, timeout=60000)
                      
                      print(">>> Mencari tombol download...")
                      # Tunggu tombol yang mengarah ke halaman download
                      download_page_selector = "a.download-btn"
                      await page.wait_for_selector(download_page_selector)
                      await page.click(download_page_selector)

                      # Tunggu tombol generate/final download
                      final_btn = "a.mdl-button--colored"
                      await page.wait_for_selector(final_btn, timeout=60000)
                      
                      print(">>> Mengunduh file...")
                      async with page.expect_download() as download_info:
                          await page.click(final_btn)
                      
                      download = await download_info.value
                      await download.save_as("tribun.apk")
                      print(f"✅ Berhasil mengunduh APK!")
                      
                  except Exception as e:
                      print(f"❌ Gagal di tengah jalan: {e}")
                      await page.screenshot(path="error_debug.png")
                      raise e
                  finally:
                      await browser.close()

          asyncio.run(run())
          EOF

      - name: Decompile Source Code
        run: |
          jadx tribun.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      - name: Build AI Context
        run: |
          python3 - << 'EOF'
          import os, json
          source_dir = 'extracted_source'
          context = {"api_logic": []}
          for root, _, files in os.walk(source_dir):
              for file in files:
                  if file.endswith(('.java', '.kt')):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              content = f.read()
                              # Cari pola API Tribun secara spesifik
                              if any(k in content for k in ['tribun', 'api', 'retrofit', 'endpoint']):
                                  context["api_logic"].append({"file": file, "snippet": content[:8000]})
                      except: continue
          with open('ai_input.json', 'w') as f:
              json.dump(context, f, indent=2)
          EOF

      - name: Setup Bun & AI Runner
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: AI Audit & Generate Postman
        run: |
          bun install -g opencode-ai
          python3 -c "
          ctx = open('ai_input.json').read()
          prompt = f'Analisis endpoint API dari kode Tribunnews ini. Berikan output Postman Collection V2.1 dalam JSON murni:\n{ctx[:30000]}'
          open('prompt.txt', 'w').write(prompt)
          "
          opencode run "$(cat prompt.txt)" > raw_output.json

      - name: Finalize Postman Collection
        run: |
          python3 - << 'EOF'
          import re, json, sys
          try:
              content = open('raw_output.json').read()
              match = re.search(r'(\{.*\})', content, re.DOTALL)
              if match:
                  data = json.loads(match.group(1))
                  with open('Tribun_Audit_Report.json', 'w') as f:
                      json.dump(data, f, indent=4)
                  print("✅ Berhasil! File Postman siap.")
              else: sys.exit(1)
          except: sys.exit(1)
          EOF

      - name: Save Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-audit-tribun
          path: |
            Tribun_Audit_Report.json
            error_debug.png
