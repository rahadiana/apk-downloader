name: Agentic APK Auditor - Hybrid Stable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agentic-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 jq curl grep
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx

      - name: Fetch Target APK
        run: |
          curl -L -o target.apk "https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sports.apk"
          if [ ! -s target.apk ]; then echo "❌ Download gagal!"; exit 1; fi

      - name: Decompile APK
        run: |
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      - name: Map API Structure
        run: |
          mkdir -p audit_hints
          cd extracted_source/sources || exit 1
          grep -rE "@GET|@POST|BASE_URL|http|https" . | head -n 100 > ../../audit_hints/api_hints.txt || true
          find . -maxdepth 5 -name "*Api*" -o -name "*Service*" > ../../audit_hints/file_map.txt || true
          cd ../..

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Agentic Deep Audit
        run: |
          bun install -g opencode-ai

          API_HINTS=$(cat audit_hints/api_hints.txt)
          FILE_MAP=$(cat audit_hints/file_map.txt)

          # Tulis prompt ke file supaya tidak ada masalah escaping
          cat > prompt.txt << PROMPT
You are an API reverse engineer. Analyze the extracted Android APK source hints below and create a valid Postman Collection V2.1 JSON file.

CRITICAL INSTRUCTIONS:
- Write the result to a file named exactly: Final_Audit_Postman.json
- The JSON must have "info" and "item" keys (Postman Collection V2.1 format)
- Do NOT print JSON to terminal, write it to the file using your file writing tools

=== API HINTS ===
${API_HINTS}

=== FILE MAP ===
${FILE_MAP}
PROMPT

          # Gunakan --prompt flag (bukan pipe/stdin) + --dangerously-skip-permissions
          opencode run \
            --prompt "$(cat prompt.txt)" \
            --dangerously-skip-permissions \
            2>&1 | tee agent_log.txt || true

          echo "=== FILES SETELAH OPENCODE ==="
          ls -la
          find . -name "*.json" 2>/dev/null || true

      - name: Validate Result
        run: |
          python3 - << 'EOF'
          import json, os, sys

          output_path = 'Final_Audit_Postman.json'

          if not os.path.exists(output_path):
              print("❌ Gagal: File Final_Audit_Postman.json tidak ditemukan.")
              sys.exit(1)

          with open(output_path, 'r', encoding='utf-8') as f:
              content = f.read().strip()

          if not content:
              print("❌ Gagal: File kosong.")
              sys.exit(1)

          try:
              parsed = json.loads(content)
          except json.JSONDecodeError as e:
              print(f"❌ JSON tidak valid: {e}")
              sys.exit(1)

          if 'info' not in parsed or 'item' not in parsed:
              print(f"❌ Bukan Postman Collection V2.1. Keys ada: {list(parsed.keys())}")
              sys.exit(1)

          print(f"✅ Sukses: {len(parsed.get('item', []))} endpoint(s) ditemukan.")
          sys.exit(0)
          EOF

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            Final_Audit_Postman.json
            agent_log.txt
            audit_hints/
            prompt.txt
