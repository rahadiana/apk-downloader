name: Agentic APK Auditor - DEBUG

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agentic-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 jq curl grep
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx

      - name: Fetch Target APK
        run: |
          curl -L -o target.apk "https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sports.apk"
          if [ ! -s target.apk ]; then echo "❌ Download gagal!"; exit 1; fi

      - name: Decompile APK
        run: |
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      - name: Map API Structure
        run: |
          mkdir -p audit_hints
          cd extracted_source/sources || exit 1
          grep -rE "@GET|@POST|BASE_URL|http|https" . | head -n 100 > ../../audit_hints/api_hints.txt || true
          find . -maxdepth 5 -name "*Api*" -o -name "*Service*" > ../../audit_hints/file_map.txt || true
          cd ../..

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      ## DEBUG: Cek semua info opencode
      - name: Debug OpenCode CLI
        run: |
          bun install -g opencode-ai
          echo "========== VERSION =========="
          opencode --version 2>&1 || true
          echo "========== HELP =========="
          opencode --help 2>&1 || true
          echo "========== RUN HELP =========="
          opencode run --help 2>&1 || true

      ## Jalankan opencode dan dump semua output
      - name: Agentic Deep Audit
        run: |
          API_HINTS=$(cat audit_hints/api_hints.txt)
          FILE_MAP=$(cat audit_hints/file_map.txt)

          cat > prompt.txt << 'PROMPT'
          You are an API reverse engineer. Based on the extracted Android APK source code hints below, create a valid Postman Collection V2.1 JSON file.

          IMPORTANT INSTRUCTIONS:
          1. Save the output as a file named: Final_Audit_Postman.json
          2. The JSON must follow Postman Collection V2.1 format with "info" and "item" keys.
          3. Do not output JSON to the terminal — write it to the file directly.

          === API HINTS ===
          PROMPT

          echo "$API_HINTS" >> prompt.txt
          echo "=== FILE MAP ===" >> prompt.txt
          echo "$FILE_MAP" >> prompt.txt

          echo "=== RUNNING OPENCODE ==="
          cat prompt.txt | opencode --dangerously-skip-permissions 2>&1 | tee agent_log.txt || true

          echo "=== FILES AFTER OPENCODE ==="
          ls -la
          find . -name "*.json" 2>/dev/null || true

      - name: Upload Debug Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            Final_Audit_Postman.json
            agent_log.txt
            audit_hints/
            prompt.txt
