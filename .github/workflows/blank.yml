name: Universal AI APK Auditor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      ## 1. SETUP TOOLS
      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 python3-pip jq curl
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx

      ## 2. DOWNLOAD APK (Ganti link ini dengan APK target)
      - name: Fetch Target APK
        run: |
          echo ">>> Mendownload APK Target..."
          # Ganti link di bawah ini dengan APK yang mau di-audit
          curl -L -o target.apk "LINK_APK_KAMU_DISINI"
          if [ ! -s target.apk ]; then echo "❌ File kosong!"; exit 1; fi

      ## 3. DECOMPILE
      - name: Decompile Source Code
        run: |
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      ## 4. UNIVERSAL CONTEXT EXTRACTION
      - name: Build AI Context
        run: |
          python3 - << 'EOF'
          import os, json
          source_dir = 'extracted_source'
          context = {"api_logic": []}
          
          # Keyword networking universal
          keywords = ['http', 'https://', 'api/', 'retrofit', '@get', '@post', 'okhttp', 'baseurl', 'endpoint']
          
          for root, _, files in os.walk(source_dir):
              for file in files:
                  if file.endswith(('.java', '.kt')):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              content = f.read()
                              if any(k in content.lower() for k in keywords):
                                  context["api_logic"].append({
                                      "file": file,
                                      "snippet": content[:8000] 
                                  })
                      except: continue
          
          with open('ai_input.json', 'w') as f:
              json.dump(context, f, indent=2)
          EOF

      ## 5. AI RUNNER (BLIND AUDIT)
      - name: Setup Bun & AI Runner
        uses: oven-sh/setup-bun@v1

      - name: AI Audit & Postman Generation
        run: |
          bun install -g opencode-ai
          python3 -c "
          import json
          ctx = open('ai_input.json').read()
          prompt = (
              'Kamu adalah Elite API Security Researcher.\n'
              'Audit semua endpoint di kode ini. Identifikasi Base URL, '
              'semua path API, dan headers/auth yang digunakan.\n'
              'HANYA keluarkan JSON Postman Collection V2.1 yang valid.\n'
              'Jangan ada penjelasan teks apapun.\n\n' + ctx[:35000]
          )
          open('prompt.txt', 'w').write(prompt)
          "
          opencode run "$(cat prompt.txt)" > raw_ai_output.json

      ## 6. CLEANUP & PARSING (Sama seperti sebelumnya)
      - name: Finalize Postman Collection
        run: |
          python3 - << 'EOF'
          import re, json, sys
          def extract_json(text):
              match = re.search(r'```json\s+(.*?)\s+```', text, re.DOTALL)
              if match: return match.group(1)
              start, end = text.find('{'), text.rfind('}')
              return text[start:end+1] if start != -1 else None

          try:
              with open('raw_ai_output.json', 'r') as f: content = f.read()
              json_str = extract_json(content)
              data = json.loads(json_str)
              with open('Universal_API_Audit.postman_collection.json', 'w') as f:
                  json.dump(data, f, indent=4)
              print("✅ Audit Selesai!")
          except: sys.exit(1)
          EOF

      ## 7. ARTIFACTS
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-audit-results
          path: |
            Universal_API_Audit.postman_collection.json
            ai_input.json
