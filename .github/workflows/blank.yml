name: Extract API from APK

on:
  push:
    branches: [ main ]

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Install deps
        run: sudo apt update && sudo apt install -y curl unzip python3

      - name: Download APK
        run: curl -L -o app.apk https://finance.en.uptodown.com/android/download && file app.apk

      - name: Install JADX (dynamic safe)
        run: |
          set -e
      
          sudo apt update && sudo apt install -y jq
      
          URL=$(curl -s https://api.github.com/repos/skylot/jadx/releases/latest \
            | jq -r '.assets[] | select(.name | test("jadx-.*\\.zip")) | .browser_download_url' \
            | head -n 1)
      
          echo "URL = $URL"
      
          if [ -z "$URL" ]; then
            echo "Gagal ambil URL dari GitHub API"
            exit 1
          fi
      
          curl -fL --retry 3 -o jadx.zip "$URL"
      
          file jadx.zip
          unzip -q jadx.zip

      - name: Decompile
        run: |
          JADX_DIR=$(ls -d jadx-* | head -n 1)
          $JADX_DIR/bin/jadx -d out app.apk

      - name: Extract endpoints
        run: grep -RhoE "https?://[^\" ]+" out | sort -u > urls.txt || true

      - name: Convert to JSON
        run: python3 -c "import json; print(json.dumps({'urls':[l.strip() for l in open('urls.txt')]}))" > endpoints.json

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: endpoints
          path: endpoints.json
