name: Agentic APK Auditor - Deep Analysis

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agentic-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      ## 1. SETUP TOOLS
      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 jq curl grep
          # JADX Decompiler
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx

      ## 2. FETCH APK
      - name: Fetch Target APK
        run: |
          # Ganti URL ini dengan APK yang ingin di-audit
          curl -L -o target.apk "https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sports.apk"
          if [ ! -s target.apk ]; then echo "❌ Download gagal!"; exit 1; fi

      ## 3. DECOMPILE (HANYA SOURCE CODE)
      - name: Decompile APK
        run: |
          echo ">>> Membongkar APK..."
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      ## 4. SETUP BUN & OPENCODE AI
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      ## 5. AGENTIC AI ANALYSIS (THE CORE)
      - name: Agentic Deep Audit
        run: |
          bun install -g opencode-ai
          
          # Kita buat instruksi Agentic yang kuat.
          # AI diberikan izin menggunakan shell untuk navigasi folder.
          
          cat << 'EOF' > agent_instruction.txt
          Kamu adalah Agentic API Security Researcher. 
          Tugasmu adalah mengaudit folder 'extracted_source/sources' untuk menemukan semua endpoint API.
          
          KEMAMPUANMU:
          1. Kamu bisa menggunakan perintah shell (grep, find, cat, ls) untuk menjelajah kode.
          2. Jangan hanya mencari keyword, tapi telusuri relasi antar file jika menemukan variabel Base URL.
          
          STRATEGI:
          - Cari file Interface (Retrofit) atau Class Networking (OkHttp).
          - Identifikasi Base URL (Production/Staging).
          - Ekstrak Path, Method (GET/POST/PUT), Headers, dan skema Autentikasi.
          
          OUTPUT:
          - Berikan hasil akhir dalam format JSON Postman Collection V2.1.
          - Simpan hasil tersebut ke dalam file bernama 'Final_Audit_Postman.json'.
          - Jika sudah selesai, katakan "AUDIT_COMPLETE".
          EOF

          # Menjalankan OpenCode dengan akses ke filesystem hasil dekompilasi
          opencode run "$(cat agent_instruction.txt)" --allow-shell --path ./extracted_source/sources > raw_agent_output.txt

      ## 6. VALIDASI & CLEANUP
      - name: Finalize Result
        run: |
          python3 - << 'EOF'
          import re, json, os, sys
          
          output_file = 'Final_Audit_Postman.json'
          raw_log = 'raw_agent_output.txt'
          
          if not os.path.exists(output_file):
              # Jika AI tidak membuat file sendiri, kita coba ekstrak dari log output-nya
              print(">>> Mencoba mengekstrak JSON dari log agent...")
              if os.path.exists(raw_log):
                  with open(raw_log, 'r') as f:
                      content = f.read()
                  match = re.search(r'(\{.*\})', content, re.DOTALL)
                  if match:
                      with open(output_file, 'w') as f:
                          f.write(match.group(1))
                      print("✅ Berhasil mengekstrak JSON.")
                  else:
                      print("❌ Gagal menemukan JSON di log.")
                      sys.exit(1)
          else:
              print("✅ File JSON ditemukan (dibuat langsung oleh agent).")
          EOF

      ## 7. UPLOAD ARTIFACTS
      - name: Upload Audit Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-audit-results
          path: |
            Final_Audit_Postman.json
            raw_agent_output.txt
