name: Universal AI APK Auditor - The Clean Version

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Direct Link APK'
        required: false
        default: 'https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sofascore.apk'

jobs:
  clean-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      ## 1. SETUP TOOLS
      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 curl
          # JADX
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx
          # Bun & OpenCode
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      ## 2. DOWNLOAD & BONGKAR
      - name: Download & Decompile
        run: |
          APK_URL="${{ github.event.inputs.apk_url }}"
          [ -z "$APK_URL" ] && APK_URL="https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sofascore.apk"
          curl -L -f -o target.apk "$APK_URL"
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      ## 3. FILTER FILE (BIAR GAK KEPENUHAN)
      - name: Select Core Files
        run: |
          python3 - << 'EOF'
          import os, json
          source_dir = 'extracted_source'
          context = []
          patterns = ['retrofit', 'okhttp', '@GET', '@POST', 'Interceptor', 'X-So-']
          
          for root, _, files in os.walk(source_dir):
              for file in files:
                  if file.endswith(('.java', '.kt')):
                      try:
                          with open(os.path.join(root, file), 'r', encoding='utf-8') as f:
                              content = f.read()
                              if any(k in content for k in patterns):
                                  context.append(f"--- FILE: {file} ---\n{content[:6000]}")
                      except: continue
          
          # Ambil 30 file paling penting biar AI fokus
          with open('clean_context.txt', 'w') as f:
              f.write("\n".join(context[:30]))
          EOF

      ## 4. SINGLE AI PASS (MINTA JSON RAPIH)
      - name: AI Audit
        run: |
          ~/.bun/bin/bun install -g opencode-ai
          
          echo "Tugasmu adalah menganalisis kode sumber APK ini dan membuat Postman Collection V2.1.
          
          INSTRUKSI:
          1. Temukan Base URL dan semua Endpoint API.
          2. Kelompokkan ke dalam FOLDER yang logis.
          3. Gunakan variabel {{baseUrl}} untuk semua request.
          4. Masukkan Header yang ditemukan (seperti User-Agent, X-So-Auth, dll).
          5. OUTPUT HARUS HANYA JSON VALID (POSTMAN COLLECTION). JANGAN ADA PENJELASAN TEKS.
          
          KODE SUMBER:
          $(cat clean_context.txt)" > clean_prompt.txt
          
          cat clean_prompt.txt | ~/.bun/bin/opencode run > result.json

      ## 5. FINAL POLISH (PASTIKAN JSON VALID)
      - name: Final Validation
        run: |
          python3 - << 'EOF'
          import json, re
          try:
              content = open('result.json').read()
              # Bersihkan teks sampah kalau AI curhat
              match = re.search(r'(\{.*\})', content, re.DOTALL)
              if match:
                  data = json.loads(match.group(1))
                  with open('Final_Audit_Result.json', 'w') as f:
                      json.dump(data, f, indent=4)
                  print("✅ JSON Berhasil Dirapikan!")
              else:
                  print("❌ AI Gagal ngasih JSON.")
          except Exception as e:
              print(f"❌ Error: {e}")
          EOF

      ## 6. SAVE RESULT
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-audit-rapih
          path: Final_Audit_Result.json
