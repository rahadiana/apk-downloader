name: Ultimate AI APK Security Auditor & Postman Generator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      ## 1. SETUP ENVIRONMENT & TOOLS
      - name: Install Forensic Tools (JADX & Python)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 python3-pip curl jq
          # Install JADX Decompiler
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx
          # Install Python Dependencies
          pip install pandas requests --quiet

      - name: Setup Bun & Opencode
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install AI Engine
        run: |
          bun install -g opencode-ai
          sleep 5

      ## 2. EKSTRAKSI & DEKOMPILASI (MENDAPATKAN SOURCE CODE)
      - name: Download & Decompile APK
        run: |
          curl -fL --retry 3 -o target.apk "https://raw.githubusercontent.com/rahadiana/apk-downloader/refs/heads/main/ini.apk"
          echo ">>> Memulai dekompilasi JADX (Source Code Extraction)..."
          jadx target.apk -d extracted_source --no-res --show-bad-code
          echo "✅ Dekompilasi selesai."

      ## 3. PRE-PROCESSING (MEMBANGUN KONTEKS UNTUK AI)
      - name: Build AI Context Map
        run: |
          python3 - << 'EOF'
          import os, re, json
          source_dir = 'extracted_source'
          context = {"api_logic": [], "hardcoded_secrets": [], "network_files": []}
          
          # Mencari file yang mengandung logika networking
          for root, _, files in os.walk(source_dir):
              for file in files:
                  if file.endswith(('.java', '.kt')):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              content = f.read()
                              if any(k in content for k in ['Retrofit', 'OkHttp', 'HttpURLConnection', 'URL']):
                                  context["api_logic"].append({
                                      "file": file,
                                      "snippet": content[:7000] # Menjaga agar token AI tidak overload
                                  })
                              # Deteksi API Keys sederhana
                              keys = re.findall(r'(?i)(api[_-]key|secret|token|auth).*?["\']([a-zA-Z0-9_\-\.]{10,})["\']', content)
                              if keys:
                                  context["hardcoded_secrets"].append({"file": file, "findings": keys})
                      except: continue

          with open('ai_input_context.json', 'w') as f:
              json.dump(context, f, indent=2)
          EOF

      ## 4. AI AUDIT ROUND 1: MAPPING & RECONSTRUCTION
      - name: AI Round 1 - Architecture Mapping
        run: |
          python3 -c "
          import json
          ctx = open('ai_input_context.json').read()
          prompt = f'Kamu adalah Senior Security Engineer. Analisis source code APK ini:\n{ctx[:35000]}\n\nIdentifikasi: 1. Base URL 2. Semua Endpoint 3. Auth Mechanism. Output dalam JSON murni.'
          open('prompt_r1.txt', 'w').write(prompt)
          "
          opencode run "$(cat prompt_r1.txt)" > mapping_report.json

      ## 5. AI AUDIT ROUND 2: SECURITY TESTING & CURL GENERATION
      - name: AI Round 2 - Generate Test Cases
        run: |
          python3 -c "
          mapping = open('mapping_report.json').read()
          prompt = f'Berdasarkan mapping ini: {mapping}\n\nBuat daftar curl command untuk testing setiap endpoint. Sertakan header yang diperlukan. Output dalam JSON: {{\"test_cases\": []}}'
          open('prompt_r2.txt', 'w').write(prompt)
          "
          opencode run "$(cat prompt_r2.txt)" > test_cases.json

      ## 6. EKSEKUSI PENGUJIAN OTOMATIS
      - name: Execute Live API Tests
        run: |
          python3 - << 'PYEOF'
          import json, subprocess
          try:
              data = json.load(open('test_cases.json'))
              # Mencari blok test_cases jika AI memberikan teks tambahan
              cases = data.get('test_cases', []) if isinstance(data, dict) else []
              results = []
              for case in cases:
                  cmd = case.get('curl_command')
                  if cmd and "[TOKEN]" not in cmd:
                      print(f"Running test: {case.get('name')}")
                      res = subprocess.run(cmd + " -s -w ' %{http_code}'", shell=True, capture_output=True, text=True)
                      results.append({"name": case.get('name'), "output": res.stdout})
              json.dump(results, open('test_results.json', 'w'))
          except: print("⚠️ Gagal menjalankan test otomatis")
          PYEOF

      ## 7. AI ROUND 3: GENERATE POSTMAN COLLECTION
      - name: AI Round 3 - Postman Collection Generator
        run: |
          python3 -c "
          mapping = open('mapping_report.json').read()
          prompt = f'Ubah data API ini menjadi Postman Collection V2.1 JSON murni:\n{mapping}\n\nGunakan variabel {{{{baseUrl}}}}. Kelompokkan berdasarkan fungsionalitas.'
          open('prompt_postman.txt', 'w').write(prompt)
          "
          opencode run "$(cat prompt_postman.txt)" > raw_postman.json
          
          # Cleanup JSON Postman agar valid
          python3 -c "
          import re, json
          raw = open('raw_postman.json').read()
          match = re.search(r'\{.*\}', raw, re.DOTALL)
          if match:
              with open('APK_Audit_Collection.json', 'w') as f:
                  json.dump(json.loads(match.group()), f, indent=4)
          "

      ## 8. FINAL REPORT & ARTIFACTS
      - name: Upload Audit Results
        uses: actions/upload-artifact@v4
        with:
          name: Full-API-Audit-Package
          path: |
            APK_Audit_Collection.json
            mapping_report.json
            test_results.json

      - name: GitHub Summary
        run: |
          echo "## 🛡️ APK API Audit Berhasil" >> $GITHUB_STEP_SUMMARY
          echo "Konteks source code telah dianalisis oleh AI." >> $GITHUB_STEP_SUMMARY
          echo "Silakan download Postman Collection di bagian Artifacts." >> $GITHUB_STEP_SUMMARY
