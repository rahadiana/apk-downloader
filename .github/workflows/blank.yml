name: Agentic APK Auditor - Fixed Stable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agentic-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      ## 1. SETUP (JADX & Tools)
      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 jq curl grep
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx

      ## 2. FETCH APK
      - name: Fetch Target APK
        run: |
          curl -L -o target.apk "https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sports.apk"
          if [ ! -s target.apk ]; then echo "❌ Download gagal!"; exit 1; fi

      ## 3. DECOMPILE
      - name: Decompile APK
        run: |
          # Hanya ambil source untuk menghemat waktu dan ruang
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      ## 4. SETUP BUN & OPENCODE AI
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      ## 5. AGENTIC AI ANALYSIS (FIXED FOR GITHUB ACTIONS)
      - name: Agentic Deep Audit
        run: |
          bun install -g opencode-ai
          
          # Gunakan instruksi yang sangat spesifik untuk menghindari 'loop' atau 'permission denied'
          cat << 'EOF' > agent_instruction.txt
          SYSTEM: You are a non-interactive Agentic Security Auditor.
          WORKING_DIR: ./extracted_source/sources
          
          TASK:
          1. Use 'grep -rE "@GET|@POST|BASE_URL" .' to find networking files.
          2. Use 'cat' to read the most important files.
          3. Construct a Postman Collection V2.1 JSON.
          
          IMPORTANT:
          - DO NOT explain your process.
          - DO NOT ask for permission.
          - ONLY output the JSON block inside markdown.
          EOF

          # Menjalankan opencode dengan 'yes' pipe untuk bypass konfirmasi shell
          yes | opencode run "$(cat agent_instruction.txt)" --allow-shell --path ./extracted_source > agent_log.txt 2>&1 || true

      ## 6. FINAL EXTRACTION (SMART PARSING)
      - name: Finalize Result
        run: |
          python3 - << 'EOF'
          import re, json, os, sys
          
          def extract_json(text):
              # Prioritas: Ambil blok JSON terbesar di antara curly braces
              matches = re.findall(r'(\{.*\})', text, re.DOTALL)
              if matches:
                  return max(matches, key=len)
              return None

          log_path = 'agent_log.txt'
          output_path = 'Final_Audit_Postman.json'

          if not os.path.exists(log_path):
              print("❌ Log file not found")
              sys.exit(1)

          with open(log_path, 'r', encoding='utf-8') as f:
              content = f.read()

          json_str = extract_json(content)
          if json_str:
              try:
                  # Bersihkan whitespace yang merusak parsing
                  clean_data = json.loads(json_str)
                  with open(output_path, 'w') as f:
                      json.dump(clean_data, f, indent=4)
                  print("✅ Final_Audit_Postman.json created successfully.")
              except Exception as e:
                  print(f"❌ JSON Parsing failed: {e}")
                  # Save raw for debugging
                  with open('failed_extract.txt', 'w') as f: f.write(json_str)
                  sys.exit(1)
          else:
              print("❌ No JSON found in agent log.")
              sys.exit(1)
          EOF

      ## 7. UPLOAD
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-audit-results
          path: |
            Final_Audit_Postman.json
            agent_log.txt
            failed_extract.txt
