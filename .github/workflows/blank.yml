name: Extract API from APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl unzip python3 default-jre-headless tor proxychains4

      # Pakai Tor sebagai proxy — IP tidak kelihatan sebagai datacenter
      - name: Start Tor proxy
        run: |
          sudo service tor start
          sleep 5
          # Test tor jalan
          curl --socks5 127.0.0.1:9050 https://check.torproject.org/api/ip | python3 -m json.tool

      - name: Download APK (multi-source via Tor)
        run: |
          set -e
          PKG="com.yahoo.mobile.client.android.finance"
          PROXY="--socks5-hostname 127.0.0.1:9050"

          try_apkcombo() {
            echo ">>> Mencoba APKCombo..."
            PAGE=$(curl -fsSL $PROXY \
              -A "Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36" \
              -H "Accept: text/html,application/xhtml+xml" \
              -H "Accept-Language: en-US,en;q=0.9" \
              "https://apkcombo.com/yahoo-finance/$PKG/download/apk")

            APK_URL=$(echo "$PAGE" | grep -oE 'https://[^"]+\.apk[^"]*' | grep -v 'thumb\|icon\|img' | head -1)
            [ -z "$APK_URL" ] && return 1

            echo "URL: $APK_URL"
            curl -fL $PROXY \
              -A "Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36" \
              --retry 3 -o app.apk "$APK_URL"
          }

          try_apkpure() {
            echo ">>> Mencoba APKPure..."
            # APKPure API v3
            VER_JSON=$(curl -fsSL $PROXY \
              -H "X-Cv: 3172501" \
              -H "X-Sv: 2" \
              "https://api.pureapk.com/m/v3/cms/app/version?package_name=$PKG&hl=en")

            APK_URL=$(echo "$VER_JSON" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(d.get('apk',{}).get('download_url',''))
          " 2>/dev/null)
            [ -z "$APK_URL" ] && return 1

            echo "URL: $APK_URL"
            curl -fL $PROXY --retry 3 -o app.apk "$APK_URL"
          }

          try_apkdone() {
            echo ">>> Mencoba APKDone..."
            PAGE=$(curl -fsSL $PROXY \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
              "https://apkdone.com/$PKG/")

            APK_URL=$(echo "$PAGE" | grep -oE 'https://[^"]+\.apk' | head -1)
            [ -z "$APK_URL" ] && return 1

            echo "URL: $APK_URL"
            curl -fL $PROXY --retry 3 -o app.apk "$APK_URL"
          }

          # Coba satu per satu, berhenti kalau berhasil
          try_apkcombo || try_apkpure || try_apkdone || {
            echo "❌ Semua sumber gagal"
            exit 1
          }

          # Validasi hasil
          echo "=== APK INFO ==="
          ls -lh app.apk
          file app.apk | grep -q "Zip archive" || { echo "❌ Bukan APK valid"; exit 1; }
          unzip -l app.apk | grep -q "classes.dex" || { echo "❌ Tidak ada dex"; exit 1; }
          echo "✅ APK valid"

      - name: Install JADX
        run: |
          curl -fL --retry 3 -o jadx.zip \
            https://github.com/skylot/jadx/releases/download/v1.5.1/jadx-1.5.1.zip
          unzip -q jadx.zip -d jadx-dist
          chmod +x jadx-dist/bin/jadx

      - name: Decompile
        run: |
          mkdir -p out
          export JAVA_OPTS="-Xmx4g"
          jadx-dist/bin/jadx --threads-count 4 --no-res -d out app.apk
          echo "Total .java: $(find out -name '*.java' | wc -l)"

      - name: Extract endpoints
        run: |
          grep -RhoE 'https?://[^"'\'' \t\n\r<>{}|\\^`]+' out/ \
            | grep -vE '(schemas\.android\.com|w3\.org|apache\.org|xmlns|example\.com)' \
            | sort -u > urls.txt || true
          echo "Total URL: $(wc -l < urls.txt)"
          head -50 urls.txt

      - name: Convert to JSON
        run: |
          python3 - << 'EOF'
          import json
          with open("urls.txt") as f:
              urls = [l.strip() for l in f if l.strip()]
          out = {"total": len(urls), "urls": urls, "by_domain": {}}
          for url in urls:
              try:
                  d = url.split("/")[2]
                  out["by_domain"].setdefault(d, []).append(url)
              except: pass
          json.dump(out, open("endpoints.json","w"), indent=2)
          print(f"✅ {len(urls)} URLs saved")
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: endpoints-${{ github.run_number }}
          path: |
            endpoints.json
            urls.txt
