name: Agentic APK Auditor - Ultra Deep

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'URL APK yang ingin diaudit'
        required: true
        default: 'https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sofascore.apk'

jobs:
  agentic-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 460

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 python3-pip jq curl
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx

      - name: Fetch Target APK
        run: |
          APK_URL="${{ github.event.inputs.apk_url || 'https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Sports.apk' }}"
          echo "Downloading: $APK_URL"
          curl -L -o target.apk "$APK_URL"
          if [ ! -s target.apk ]; then echo "Download gagal!"; exit 1; fi
          echo "OK: $(ls -lh target.apk | awk '{print $5}')"

      - name: Decompile APK
        run: |
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4
          echo "Total: $(find extracted_source -name '*.java' | wc -l) java files"

      - name: Build AI Context
        run: |
          python3 << 'PYEOF'
          import os, json, re

          source_dir = 'extracted_source'

          NETWORK_KEYWORDS = [
              '@GET', '@POST', '@PUT', '@DELETE', '@PATCH', '@HEAD', '@OPTIONS',
              '@Query', '@Path', '@Body', '@Header', '@Headers', '@Field',
              '@FormUrlEncoded', '@Multipart', '@Part', '@Url',
              'retrofit2', 'Retrofit.Builder', 'baseUrl', 'BASE_URL',
              'OkHttpClient', 'Request.Builder', 'HttpUrl',
              'RequestQueue', 'StringRequest', 'JsonObjectRequest',
              'ApolloClient', 'graphql',
              'http://', 'https://',
              '/api/', '/v1/', '/v2/', '/v3/',
              'Authorization', 'Bearer', 'X-Api-Key', 'api_key',
              'ApiService', 'ApiClient', 'NetworkService', 'RemoteDataSource',
              'RestClient', 'EndpointService', 'DataSource', 'Repository',
          ]

          SKIP_KEYWORDS = [
              'junit', 'androidx.test', 'BuildConfig', 'R.string',
          ]

          results = {"base_urls": [], "api_files": [], "total_files_scanned": 0}
          seen_urls = set()

          for root, _, files in os.walk(source_dir):
              for file in files:
                  if not file.endswith(('.java', '.kt')):
                      continue
                  path = os.path.join(root, file)
                  results["total_files_scanned"] += 1
                  try:
                      with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                          content = f.read()
                  except:
                      continue
                  if any(k in content for k in SKIP_KEYWORDS):
                      continue
                  matched = [k for k in NETWORK_KEYWORDS if k in content]
                  if not matched:
                      continue
                  for url in re.findall(r'https?://[^\s\'"<>{}\\]+', content):
                      base = re.match(r'(https?://[^/\s]+(?:/[^/\s]+)?)', url)
                      if base:
                          clean = base.group(1).rstrip('.,;)')
                          if clean not in seen_urls and len(clean) > 10:
                              seen_urls.add(clean)
                              results["base_urls"].append(clean)
                  results["api_files"].append({
                      "file": os.path.relpath(path, source_dir),
                      "score": len(matched),
                      "matched_keywords": matched[:15],
                      "content": content[:12000]
                  })

          results["api_files"].sort(key=lambda x: x["score"], reverse=True)
          results["api_files"] = results["api_files"][:25]

          print(f"Scanned: {results['total_files_scanned']} files")
          print(f"Relevant: {len(results['api_files'])} files")
          print(f"Base URLs: {results['base_urls'][:5]}")

          with open('ai_input.json', 'w') as f:
              json.dump(results, f, indent=2)
          PYEOF

      ## Setup opencode config SEBELUM run — ini yang bikin ultra deep
      - name: Setup OpenCode Config & Agent
        run: |
          mkdir -p .opencode/agents .opencode/skills/apk-analyst

          # 1. opencode.json — config global: model terbaik, temperature rendah untuk presisi
          cat > opencode.json << 'JSON'
          {
            "$schema": "https://opencode.ai/config.json",
            "agent": {
              "apk-auditor": {
                "description": "Elite Android APK reverse engineer specialized in extracting API endpoints and creating Postman collections",
                "mode": "primary",
                "temperature": 0.1,
                "steps": 50,
                "permission": {
                  "read": "allow",
                  "edit": "allow",
                  "bash": "allow",
                  "glob": "allow",
                  "grep": "allow",
                  "list": "allow"
                }
              }
            }
          }
          JSON

          # 2. AGENTS.md — rules permanen yang selalu dibaca opencode
          cat > AGENTS.md << 'MD'
          # APK Reverse Engineering Agent

          You are an Elite Android APK Security Researcher and API Reverse Engineer.

          ## Your Mission
          Analyze decompiled Android APK source code and extract ALL API endpoints into a Postman Collection V2.1 JSON file.

          ## Project Structure
          - `extracted_source/` — decompiled Java/Kotlin source from JADX
          - `ai_input.json` — pre-extracted list of relevant API files and base URLs
          - `Final_Audit_Postman.json` — YOUR OUTPUT FILE (must be created)

          ## Mandatory Workflow
          1. Read `ai_input.json` first to get the list of relevant files and base URLs
          2. Read EACH file listed in `ai_input.json` using your read tool — do NOT skip files
          3. For each file, extract:
             - HTTP method (@GET, @POST, @PUT, @DELETE, @PATCH)
             - Endpoint path (including path variables like {id})
             - Query parameters (@Query)
             - Request body structure (@Body)
             - Headers (@Header, @Headers)
             - Base URL / BASE_URL constant
          4. Also use grep/glob to search for MORE files not in the list:
             - grep for "BASE_URL" across all files
             - grep for "interface.*Api" or "interface.*Service"
             - Find any string containing "/api/" or "/v1/" or "/v2/"
          5. Reconstruct full URLs: base_url + path
          6. Write Final_Audit_Postman.json with ALL found endpoints

          ## Output Format
          Postman Collection V2.1 — must have "info" and "item" keys.
          Group endpoints by feature module (Auth, User, Search, etc).
          Include example request bodies and headers where found.

          ## Critical Rules
          - NEVER invent or guess endpoints — only include what is in the code
          - ALWAYS read the actual source files, not just the summary
          - If a file has Retrofit annotations, read it completely
          - Check for multiple base URLs (staging, production, etc)
          MD

          # 3. Agent skill khusus APK analysis
          cat > .opencode/skills/apk-analyst/SKILL.md << 'SKILL'
          ---
          name: apk-analyst
          description: Specialized skill for Android APK reverse engineering, Retrofit API extraction, and Postman collection generation
          license: MIT
          compatibility: opencode
          ---

          ## APK Analysis Patterns

          ### Finding Retrofit Interfaces
          ```bash
          grep -rn "@GET\|@POST\|@PUT\|@DELETE\|@PATCH" extracted_source/ --include="*.java" -l
          grep -rn "interface.*Service\|interface.*Api\|interface.*Endpoint" extracted_source/ --include="*.java" -l
          ```

          ### Finding Base URLs
          ```bash
          grep -rn "BASE_URL\|baseUrl\|base_url\|BuildConfig.API" extracted_source/ --include="*.java"
          grep -rn '"https://\|"http://' extracted_source/ --include="*.java" | grep -v "test\|Test"
          ```

          ### Finding Auth Headers
          ```bash
          grep -rn "Authorization\|Bearer\|X-Api-Key\|X-Auth\|token" extracted_source/ --include="*.java" | head -50
          ```

          ### Finding OkHttp Interceptors (often contains auth logic)
          ```bash
          grep -rn "Interceptor\|addHeader\|header(" extracted_source/ --include="*.java" -l
          ```

          ### Postman Collection V2.1 Template
          ```json
          {
            "info": {
              "name": "APK API Collection",
              "schema": "https://schema.getpostman.com/json/collection/v2.1.0/collection.json"
            },
            "item": [
              {
                "name": "Feature Group",
                "item": [
                  {
                    "name": "Endpoint Name",
                    "request": {
                      "method": "GET",
                      "header": [],
                      "url": {
                        "raw": "{{base_url}}/api/v1/example",
                        "host": ["{{base_url}}"],
                        "path": ["api", "v1", "example"]
                      }
                    }
                  }
                ]
              }
            ]
          }
          ```
          SKILL

          echo "Config setup done."
          ls -la opencode.json AGENTS.md
          ls -la .opencode/agents/ .opencode/skills/apk-analyst/

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Agentic Deep Audit
        run: |
          bun install -g opencode-ai

          # Jalankan dengan agent khusus apk-auditor
          # AI akan baca AGENTS.md + skills otomatis — tidak perlu prompt panjang
          opencode run \
            --agent apk-auditor \
            --dangerously-skip-permissions \
            "Start the APK audit. Read ai_input.json, analyze all source files, use the apk-analyst skill, then write Final_Audit_Postman.json with every API endpoint found." \
            2>&1 | tee agent_log.txt || true

          echo "=== FILES AFTER OPENCODE ==="
          ls -la
          find . -name "*.json" -newer ai_input.json 2>/dev/null || true

      - name: Validate Result
        run: |
          python3 -c "
          import json, os, sys
          path = 'Final_Audit_Postman.json'
          if not os.path.exists(path):
              print('GAGAL: File tidak ditemukan.')
              sys.exit(1)
          with open(path) as f:
              content = f.read().strip()
          if not content:
              print('GAGAL: File kosong.')
              sys.exit(1)
          try:
              parsed = json.loads(content)
          except Exception as e:
              print(f'GAGAL: JSON invalid — {e}')
              sys.exit(1)
          if 'info' not in parsed or 'item' not in parsed:
              print(f'GAGAL: Bukan Postman V2.1. Keys: {list(parsed.keys())}')
              sys.exit(1)
          items = parsed.get('item', [])
          total = sum(len(g.get('item', [1])) for g in items)
          print(f'SUKSES: {len(items)} grup, ~{total} endpoint ditemukan.')
          "

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            Final_Audit_Postman.json
            agent_log.txt
            ai_input.json
            AGENTS.md
            opencode.json
