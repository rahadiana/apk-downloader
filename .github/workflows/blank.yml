name: Extract API from APK

on:
  push:
    branches: [ main ]

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y wget unzip python3

      # -----------------------
      # 1) Download APK
      # -----------------------
      - name: Download APK (Yahoo Finance)
        run: |
          wget --content-disposition -O app.apk "https://finance.en.uptodown.com/android/download"
          file app.apk
          ls -lh

      # -----------------------
      # 2) Install JADX (CLI)
      # -----------------------
      - name: Install JADX
        run: |
          wget https://github.com/skylot/jadx/releases/latest/download/jadx-1.5.0.zip
          unzip -q jadx-1.5.0.zip

      # -----------------------
      # 3) Decompile
      # -----------------------
      - name: Decompile APK
        run: |
          ./jadx-*/bin/jadx -d out app.apk
          ls -lah out

      # -----------------------
      # 4) Extract endpoints → JSON
      # -----------------------
      - name: Extract endpoints
        run: |
          python3 - << 'PY'
import os, re, json

root = "out/sources"
url_regex = re.compile(r'https?://[^\s"\'<>]+')

hits = set()

for dirpath, _, filenames in os.walk(root):
    for f in filenames:
        if f.endswith((".java", ".kt")):
            p = os.path.join(dirpath, f)
            try:
                with open(p, "r", errors="ignore") as fh:
                    text = fh.read()
                    for m in url_regex.findall(text):
                        hits.add(m)
            except:
                pass

# simple normalization / filtering
def normalize(u):
    return u.strip().rstrip(');,\'"')

urls = sorted({normalize(u) for u in hits if len(u) < 300})

# group by host
by_host = {}
for u in urls:
    host = re.sub(r'^https?://', '', u).split('/')[0]
    by_host.setdefault(host, []).append(u)

out = {
  "total": len(urls),
  "hosts": {k: len(v) for k,v in by_host.items()},
  "endpoints": urls
}

with open("endpoints.json","w") as f:
    json.dump(out, f, indent=2)

print(f"FOUND: {len(urls)} URLs")
PY

      # -----------------------
      # 5) Show result (ringkas)
      # -----------------------
      - name: Preview endpoints
        run: |
          cat endpoints.json | head -n 200

      # -----------------------
      # 6) Upload artifact
      # -----------------------
      - name: Upload JSON
        uses: actions/upload-artifact@v4
        with:
          name: endpoints
          path: endpoints.json
