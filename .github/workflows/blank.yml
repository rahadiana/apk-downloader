name: Agentic APK Auditor - Ultra Deep

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'URL APK yang ingin diaudit'
        required: true
        default: 'https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Shopee.apk'

jobs:
  agentic-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Forensic Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 python3-pip jq curl
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx

      - name: Fetch Target APK
        run: |
          APK_URL="${{ github.event.inputs.apk_url || 'https://s3-id-jkt-1.kilatstorage.id/source-code-brainly/Untitled.apk' }}"
          echo "Downloading: $APK_URL"
          curl -L -o target.apk "$APK_URL"
          if [ ! -s target.apk ]; then echo "Download gagal!"; exit 1; fi
          echo "OK: $(ls -lh target.apk | awk '{print $5}')"

      - name: Decompile APK
        run: |
          jadx target.apk -d extracted_source --no-res --show-bad-code --threads-count 4
          echo "Total: $(find extracted_source -name '*.java' | wc -l) java files"

      - name: Build AI Context
        run: |
          python3 << 'PYEOF'
          import os, json, re

          source_dir = 'extracted_source'

          NETWORK_KEYWORDS = [
              '@GET', '@POST', '@PUT', '@DELETE', '@PATCH', '@HEAD', '@OPTIONS',
              '@Query', '@Path', '@Body', '@Header', '@Headers', '@Field',
              '@FormUrlEncoded', '@Multipart', '@Part', '@Url',
              'retrofit2', 'Retrofit.Builder', 'baseUrl', 'BASE_URL',
              'OkHttpClient', 'Request.Builder', 'HttpUrl',
              'RequestQueue', 'StringRequest', 'JsonObjectRequest',
              'ApolloClient', 'graphql',
              'http://', 'https://',
              '/api/', '/v1/', '/v2/', '/v3/',
              'Authorization', 'Bearer', 'X-Api-Key', 'api_key',
              'ApiService', 'ApiClient', 'NetworkService', 'RemoteDataSource',
              'RestClient', 'EndpointService', 'DataSource', 'Repository',
          ]

          SKIP_KEYWORDS = ['junit', 'androidx.test']

          results = {"base_urls": [], "api_files": [], "total_files_scanned": 0}
          seen_urls = set()

          for root, _, files in os.walk(source_dir):
              for file in files:
                  if not file.endswith(('.java', '.kt')):
                      continue
                  path = os.path.join(root, file)
                  results["total_files_scanned"] += 1
                  try:
                      with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                          content = f.read()
                  except:
                      continue
                  if any(k in content for k in SKIP_KEYWORDS):
                      continue
                  matched = [k for k in NETWORK_KEYWORDS if k in content]
                  if not matched:
                      continue
                  for url in re.findall(r'https?://[^\s\'"<>{}\\]+', content):
                      base = re.match(r'(https?://[^/\s]+(?:/[^/\s]+)?)', url)
                      if base:
                          clean = base.group(1).rstrip('.,;)')
                          if clean not in seen_urls and len(clean) > 10:
                              seen_urls.add(clean)
                              results["base_urls"].append(clean)
                  results["api_files"].append({
                      "file": os.path.relpath(path, source_dir),
                      "score": len(matched),
                      "matched_keywords": matched[:15],
                      "content": content[:12000]
                  })

          results["api_files"].sort(key=lambda x: x["score"], reverse=True)
          results["api_files"] = results["api_files"][:25]

          print(f"Scanned: {results['total_files_scanned']} files")
          print(f"Relevant: {len(results['api_files'])} files")
          print(f"Base URLs: {results['base_urls'][:5]}")

          with open('ai_input.json', 'w') as f:
              json.dump(results, f, indent=2)
          PYEOF

      - name: Setup OpenCode Config & Agent
        run: |
          mkdir -p .opencode/skills/apk-analyst

          cat > opencode.json << 'JSON'
          {
            "$schema": "https://opencode.ai/config.json",
            "agent": {
              "apk-auditor": {
                "description": "Elite Android APK reverse engineer that extracts API endpoints",
                "mode": "primary",
                "temperature": 0.1,
                "steps": 50,
                "permission": {
                  "read": "allow",
                  "edit": "allow",
                  "bash": "allow",
                  "glob": "allow",
                  "grep": "allow",
                  "list": "allow"
                }
              }
            }
          }
          JSON

          cat > AGENTS.md << 'MD'
          # APK Reverse Engineering Agent

          You are an Elite Android APK Security Researcher and API Reverse Engineer.

          ## Your Mission
          Analyze decompiled Android APK source code and extract ALL API endpoints into a Postman Collection V2.1 JSON file named `Final_Audit_Postman.json`.

          ## Mandatory Workflow
          1. Read `ai_input.json` to get list of relevant files and base URLs
          2. Read EACH source file listed using your read/bash tools — do NOT skip
          3. Also run these grep commands to find MORE endpoints:
             - `grep -rn "@GET\|@POST\|@PUT\|@DELETE\|@PATCH" extracted_source/ --include="*.java" -l`
             - `grep -rn "BASE_URL\|baseUrl" extracted_source/ --include="*.java"`
             - `grep -rn "interface.*Api\|interface.*Service" extracted_source/ --include="*.java" -l`
          4. Read every file returned by grep above
          5. Extract: HTTP method, path, query params, body, headers, base URL
          6. Write `Final_Audit_Postman.json` — group endpoints by feature module

          ## CRITICAL: After Writing the File
          - Once you have written Final_Audit_Postman.json, STOP immediately
          - Do NOT rewrite or modify the file again
          - Do NOT delete the file
          - The file must remain at: Final_Audit_Postman.json

          ## Rules
          - NEVER invent endpoints — only use what is in the code
          - Check for multiple base URLs (staging vs production)
          MD

          cat > .opencode/skills/apk-analyst/SKILL.md << 'SKILL'
          ---
          name: apk-analyst
          description: Specialized skill for Android APK reverse engineering and Postman collection generation from Retrofit/OkHttp source code
          compatibility: opencode
          ---

          ## grep Commands for APK Analysis

          ### Find all Retrofit endpoint files
          ```bash
          grep -rn "@GET\|@POST\|@PUT\|@DELETE\|@PATCH" extracted_source/ --include="*.java" -l
          ```

          ### Find Base URLs
          ```bash
          grep -rn "BASE_URL\|baseUrl\|base_url" extracted_source/ --include="*.java"
          grep -rn '"https://' extracted_source/ --include="*.java"
          ```

          ### Find Auth/Headers
          ```bash
          grep -rn "Authorization\|Bearer\|X-Api-Key" extracted_source/ --include="*.java" | head -30
          ```

          ## Postman V2.1 Template
          ```json
          {
            "info": {
              "name": "APK API Collection",
              "schema": "https://schema.getpostman.com/json/collection/v2.1.0/collection.json"
            },
            "item": []
          }
          ```
          SKILL

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Agentic Deep Audit
        run: |
          bun install -g opencode-ai

          # Catat working directory — penting untuk debug
          WORKDIR=$(pwd)
          echo "Working dir: $WORKDIR"

          opencode run \
            --agent apk-auditor \
            --dangerously-skip-permissions \
            "Read ai_input.json, analyze all source files in extracted_source/ using bash grep and file read tools. Find every API endpoint. Write Final_Audit_Postman.json with all endpoints in Postman Collection V2.1 format. Once done, stop — do not modify the file again." \
            2>&1 | tee agent_log.txt || true

          echo "=== Scan semua JSON yang mungkin ditulis opencode ==="
          # Opencode kadang nulis di cwd berbeda — cari semua kemungkinan
          find / -name "Final_Audit_Postman.json" 2>/dev/null || true
          find $HOME -name "*.json" -newer ai_input.json 2>/dev/null | head -20 || true
          find $WORKDIR -name "*.json" -newer ai_input.json 2>/dev/null || true

          echo "=== ls working dir ==="
          ls -la $WORKDIR

      - name: Rescue Output File
        run: |
          # Cari file di mana pun opencode meletakkannya dan copy ke workdir
          FOUND=$(find / -name "Final_Audit_Postman.json" 2>/dev/null | head -1)
          if [ -n "$FOUND" ] && [ "$FOUND" != "$(pwd)/Final_Audit_Postman.json" ]; then
            echo "File ditemukan di: $FOUND — copy ke workdir"
            cp "$FOUND" ./Final_Audit_Postman.json
          fi
          ls -la Final_Audit_Postman.json 2>/dev/null || echo "File masih tidak ditemukan"

      - name: Validate Result
        run: |
          python3 -c "
          import json, os, sys
          path = 'Final_Audit_Postman.json'
          if not os.path.exists(path):
              print('GAGAL: File tidak ditemukan.')
              print('Files di direktori:')
              for f in os.listdir('.'):
                  print(f'  - {f}')
              sys.exit(1)
          with open(path) as f:
              content = f.read().strip()
          if not content:
              print('GAGAL: File kosong.')
              sys.exit(1)
          try:
              parsed = json.loads(content)
          except Exception as e:
              print(f'GAGAL: JSON invalid — {e}')
              sys.exit(1)
          if 'info' not in parsed or 'item' not in parsed:
              print(f'GAGAL: Bukan Postman V2.1. Keys: {list(parsed.keys())}')
              sys.exit(1)
          items = parsed.get('item', [])
          total = sum(len(g.get('item', [1])) for g in items)
          print(f'SUKSES: {len(items)} grup, ~{total} endpoint ditemukan.')
          "

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            Final_Audit_Postman.json
            agent_log.txt
            ai_input.json
            AGENTS.md
            opencode.json
