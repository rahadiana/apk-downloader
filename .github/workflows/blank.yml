name: Extract API from APK

on:
  push:
    branches: [ main ]

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Install deps
        run: sudo apt update && sudo apt install -y curl unzip python3

      - name: Download APK
        run: curl -L -o app.apk https://finance.en.uptodown.com/android/download && file app.apk

      - name: Install JADX
        run: |
          set -e
      
          URL="https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip"
      
          echo "Downloading JADX..."
          curl -fL --retry 3 --retry-delay 2 -o jadx.zip "$URL"
      
          echo "=== CHECK FILE ==="
          ls -lh jadx.zip
          file jadx.zip
      
          # validasi size (minimal 5MB)
          size=$(stat -c%s jadx.zip)
          if [ "$size" -lt 5000000 ]; then
            echo "Download gagal / file rusak"
            exit 1
          fi
      
          unzip -q jadx.zip
      
          echo "=== AFTER UNZIP ==="
          ls -lah

      - name: Decompile
        run: |
          JADX_DIR=$(ls -d jadx-* | head -n 1)
          $JADX_DIR/bin/jadx -d out app.apk

      - name: Extract endpoints
        run: grep -RhoE "https?://[^\" ]+" out | sort -u > urls.txt || true

      - name: Convert to JSON
        run: python3 -c "import json; print(json.dumps({'urls':[l.strip() for l in open('urls.txt')]}))" > endpoints.json

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: endpoints
          path: endpoints.json
