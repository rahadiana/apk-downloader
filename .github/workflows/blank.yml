name: Extract API from APK

on:
  push:
    branches: [ main ]

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y curl unzip python3

      - name: Download APK
        run: |
          curl -L -o app.apk "https://finance.en.uptodown.com/android/download"

          echo "=== FILE INFO ==="
          file app.apk
          ls -lh

          file app.apk | grep "Zip archive" || (echo "Bukan APK" && exit 1)

      - name: Install JADX
        run: |
          curl -L -o jadx.zip https://github.com/skylot/jadx/releases/latest/download/jadx-1.5.0.zip
          unzip -q jadx.zip

      - name: Decompile
        run: |
          JADX_DIR=$(ls -d jadx-* | head -n 1)
          $JADX_DIR/bin/jadx -d out app.apk

      # 🔥 FIX DI SINI (NO HEREDOC)
      - name: Create extractor script
        run: |
          cat << 'EOF' > extract.py
import os, re, json

urls = set()

for root, _, files in os.walk("out"):
    for f in files:
        if f.endswith((".java", ".kt")):
            try:
                with open(os.path.join(root, f), errors="ignore") as fh:
                    txt = fh.read()
                    urls.update(re.findall(r'https?://[^\\s"\\'<>]+', txt))
            except:
                pass

urls = sorted(urls)

with open("endpoints.json", "w") as f:
    json.dump({"count": len(urls), "urls": urls}, f, indent=2)

print("FOUND:", len(urls))
EOF

      - name: Run extractor
        run: |
          python3 extract.py

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: endpoints
          path: endpoints.json
