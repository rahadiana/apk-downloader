name: Extract API from APK

on:
  push:
    branches: [ main ]

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y curl unzip python3

      - name: Download APK
        run: |
          curl -L -o app.apk "https://finance.en.uptodown.com/android/download"
          echo "=== FILE INFO ==="
          file app.apk
          ls -lh
          file app.apk | grep "Zip archive" || (echo "Bukan APK" && exit 1)

      - name: Install JADX
        run: |
          curl -L -o jadx.zip https://github.com/skylot/jadx/releases/latest/download/jadx-1.5.0.zip
          unzip -q jadx.zip

      - name: Decompile
        run: |
          JADX_DIR=$(ls -d jadx-* | head -n 1)
          $JADX_DIR/bin/jadx -d out app.apk

      # 🔥 Extract endpoint TANPA heredoc Python
      - name: Extract endpoints
        run: |
          grep -RhoE 'https?://[^" >]+' out | sort -u > urls.txt || true
          echo "TOTAL URL:"
          wc -l urls.txt
          head -n 50 urls.txt

      - name: Convert to JSON
        run: |
          python3 -c "import json; print(json.dumps({'urls':[l.strip() for l in open('urls.txt')]}))" > endpoints.json

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: endpoints
          path: endpoints.json
