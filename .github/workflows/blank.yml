name: AI APK Auditor - Multi-Source Stable Mode

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit-process:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Forensic Tools & Playwright
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip python3 python3-pip jq
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx
          pip install playwright
          playwright install chromium --with-deps

      - name: Download APK via Resilient Script
        run: |
          python3 - << 'EOF'
          import asyncio
          import sys
          from playwright.async_api import async_playwright

          async def download_apk():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  # Gunakan profil yang lebih mirip manusia
                  context = await browser.new_context(
                      viewport={'width': 1280, 'height': 800},
                      user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
                  )
                  page = await context.new_page()
                  
                  # SOURCE 1: APK.SUPPORT (Seringkali lebih ramah ke GitHub IP)
                  print(">>> Mencoba Source 1: APK.Support...")
                  try:
                      await page.goto("https://apk.support/download-app/mobile.android.tribun", timeout=60000)
                      # Tunggu link download muncul secara dinamis
                      await page.wait_for_selector("a.btn-download", timeout=20000)
                      async with page.expect_download() as download_info:
                          await page.click("a.btn-download")
                      download = await download_info.value
                      await download.save_as("tribun.apk")
                      print("✅ Berhasil via Source 1!")
                      return True
                  except Exception as e:
                      print(f"⚠️ Source 1 Gagal: {e}")

                  # SOURCE 2: APK-DL (Direct Logic)
                  print(">>> Mencoba Source 2: APK-DL...")
                  try:
                      await page.goto("https://apk-dl.com/tribunnews-indonesia-local-news/mobile.android.tribun", timeout=60000)
                      # Jika tombol download-btn tidak ada, cari alternatif selector
                      await page.wait_for_selector("a", timeout=10000) 
                      # Cari link yang mengandung kata 'download' secara paksa
                      links = await page.query_selector_all("a")
                      for link in links:
                          text = await link.inner_text()
                          if "download" in text.lower():
                              await link.click()
                              break
                      
                      await page.wait_for_selector("a.mdl-button", timeout=30000)
                      async with page.expect_download() as download_info:
                          await page.click("a.mdl-button")
                      download = await download_info.value
                      await download.save_as("tribun.apk")
                      print("✅ Berhasil via Source 2!")
                      return True
                  except Exception as e:
                      print(f"⚠️ Source 2 Gagal: {e}")
                  
                  await browser.close()
                  return False

          if not asyncio.run(download_apk()):
              print("❌ SEMUA SOURCE GAGAL. Gunakan Manual Upload tribun.apk ke repo.")
              sys.exit(1)
          EOF

      - name: Decompile Source Code
        run: |
          jadx tribun.apk -d extracted_source --no-res --show-bad-code --threads-count 4

      - name: Build AI Context
        run: |
          python3 - << 'EOF'
          import os, json
          source_dir = 'extracted_source'
          context = {"api_logic": []}
          # Ekstraksi cerdas: hanya ambil file yang kemungkinan besar berisi API
          for root, _, files in os.walk(source_dir):
              for file in files:
                  if file.endswith(('.java', '.kt')):
                      if any(k in file.lower() for k in ['api', 'service', 'network', 'client', 'repository']):
                          path = os.path.join(root, file)
                          try:
                              with open(path, 'r', encoding='utf-8') as f:
                                  content = f.read()
                                  if 'tribun' in content.lower():
                                      context["api_logic"].append({"file": file, "snippet": content[:8000]})
                          except: continue
          with open('ai_input.json', 'w') as f:
              json.dump(context, f, indent=2)
          EOF

      - name: AI Runner - Deep Audit
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: AI Audit & Postman Generate
        run: |
          bun install -g opencode-ai
          python3 -c "
          ctx = open('ai_input.json').read()
          prompt = f'Kamu adalah Senior Security Auditor. Analisis kode Tribunnews ini. Cari Base URL dan Endpoint. Buat Postman Collection V2.1 JSON Murni:\n{ctx[:35000]}'
          open('prompt.txt', 'w').write(prompt)
          "
          opencode run "$(cat prompt.txt)" > raw_output.json

      - name: Finalize Postman Collection
        run: |
          python3 - << 'EOF'
          import re, json, sys
          try:
              content = open('raw_output.json').read()
              match = re.search(r'(\{.*\})', content, re.DOTALL)
              if match:
                  data = json.loads(match.group(1))
                  with open('Tribun_API_Audit.json', 'w') as f:
                      json.dump(data, f, indent=4)
                  print("✅ Selesai!")
              else: sys.exit(1)
          except: sys.exit(1)
          EOF

      - name: Save Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results-tribun
          path: Tribun_API_Audit.json
