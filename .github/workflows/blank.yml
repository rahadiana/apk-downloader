name: Extract API from APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # bisa trigger manual juga

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # naikkan — Yahoo Finance APK besar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------
      # 1) Install dependencies
      # -----------------------
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl unzip python3 default-jre-headless

      # -----------------------
      # 2) Download APK via apkeep (lebih reliable dari APKPure)
      # -----------------------
      - name: Download APK
        run: |
          set -e
          PKG="com.yahoo.mobile.client.android.finance"
      
          # Ambil link download dari APKCombo
          DL_PAGE=$(curl -fsSL "https://apkcombo.com/d?&fp=b711a1a1dbd5cac2b2f74e974a310840&ip=103.119.138.251&package_name=com.ft.news&lang=en")
          APK_URL=$(echo "$DL_PAGE" | grep -oE 'https://[^"]+\.apk[^"]*' | head -1)
      
          if [ -z "$APK_URL" ]; then
            echo "❌ URL tidak ditemukan"
            exit 1
          fi
      
          echo "Downloading: $APK_URL"
          curl -fL -A "Mozilla/5.0" -o app.apk "$APK_URL"
          ls -lh app.apk

      # -----------------------
      # 3) Install JADX
      # -----------------------
      - name: Install JADX
        run: |
          set -e
          # FIX: nama file harus "jadx.zip", bukan [jadx.zip](http://jadx.zip)
          curl -fL --retry 3 \
            -o jadx.zip \
            https://github.com/skylot/jadx/releases/download/v1.5.1/jadx-1.5.1.zip
          unzip -q jadx.zip -d jadx-dist
          chmod +x jadx-dist/bin/jadx
          echo "✅ JADX siap: $(jadx-dist/bin/jadx --version)"

      # -----------------------
      # 4) Decompile
      # -----------------------
      - name: Decompile
        run: |
          set -e
          mkdir -p out

          # Tambah memory untuk APK besar
          export JAVA_OPTS="-Xmx4g"

          jadx-dist/bin/jadx \
            --threads-count 4 \
            --no-res \
            -d out \
            app.apk

          echo "=== OUT ==="
          ls -lah out/
          find out -name "*.java" | wc -l | xargs -I{} echo "Total .java files: {}"

      # -----------------------
      # 5) Extract endpoints
      # -----------------------
      - name: Extract endpoints
        run: |
          set -e

          # Cari semua URL dari hasil decompile
          grep -RhoE 'https?://[^"'\'' \t\n\r<>{}|\\^`]+' out/ \
            | grep -v '\.class$' \
            | sort -u \
            > urls_raw.txt || true

          # Filter URL yang relevan (singkirkan library/boilerplate)
          grep -v -E \
            '(schemas\.android\.com|w3\.org|apache\.org|google\.com/schemas|xmlns|example\.com)' \
            urls_raw.txt > urls.txt || true

          echo "=== HASIL ==="
          echo "Total URL ditemukan: $(wc -l < urls.txt)"
          echo ""
          echo "--- 50 URL pertama ---"
          head -n 50 urls.txt

      # -----------------------
      # 6) Convert ke JSON
      # -----------------------
      - name: Convert to JSON
        run: |
          python3 - << 'EOF'
          import json

          with open("urls.txt") as f:
              urls = [line.strip() for line in f if line.strip()]

          # Kategorikan berdasarkan domain
          output = {
              "total": len(urls),
              "urls": urls,
              "by_domain": {}
          }

          for url in urls:
              try:
                  domain = url.split("/")[2]
                  output["by_domain"].setdefault(domain, []).append(url)
              except IndexError:
                  pass

          with open("endpoints.json", "w") as f:
              json.dump(output, f, indent=2)

          print(f"✅ Saved {len(urls)} URLs ke endpoints.json")
          EOF

      # -----------------------
      # 7) Upload artifact
      # -----------------------
      - name: Upload endpoints
        uses: actions/upload-artifact@v4
        with:
          name: endpoints-${{ github.run_number }}
          path: |
            endpoints.json
            urls.txt
          retention-days: 30

      # -----------------------
      # 8) Summary di GitHub UI
      # -----------------------
      - name: Summary
        run: |
          echo "## 📊 Hasil Ekstraksi" >> $GITHUB_STEP_SUMMARY
          echo "- **Total URL:** $(wc -l < urls.txt)" >> $GITHUB_STEP_SUMMARY
          echo "- **Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Sample URLs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -20 urls.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
